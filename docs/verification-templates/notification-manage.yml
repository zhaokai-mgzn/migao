name: notification-manage
description: 通知/消息管理
red_flags: []
business_truths:
  - 通知列表支持分页查询
  - 通知规则可创建/编辑/删除
  - 通知模板支持变量替换
  - 租户隔离：不同租户通知互不可见
  - 通知发送后 recipients 不为空

primary_specs:
  - tests/e2e/specs/settings/notifications.spec.ts
  - backend/admin-api/src/test/java/com/migao/admin/controller/NotificationControllerTest.java

reviewer_asserts:
  - API: GET /api/admin/notifications?page=1&size=10
    expect: items 非空 AND total >= 0
  - API: GET /api/admin/notifications/{id}
    expect: data 非空
  - API: POST /api/admin/notifications
    expect: status = 200 OR status = 201
  - 租户隔离: 跨租户查询通知返回 403 或空列表

confidence_required: 80%
common_pitfalls:
  - 通知模板变量未替换
  - 跨租户通知泄露
