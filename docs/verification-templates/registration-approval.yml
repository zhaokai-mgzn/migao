name: registration-approval
description: 租户注册审批
red_flags: []
business_truths:
  - 注册申请提交后状态为待审核
  - 管理员可审批通过/拒绝
  - 审批通过后租户自动创建
  - 重复注册同一手机号应提示

primary_specs:
  - tests/e2e/specs/auth/register.spec.ts
  - tests/e2e/specs/platform/registrations.spec.ts

reviewer_asserts:
  - API: POST /api/auth/register
    expect: status = 200 OR status = 201
  - API: GET /api/admin/registrations?status=待审核
    expect: items 非空 AND total >= 0
  - API: POST /api/admin/registrations/{id}/approve
    expect: status = 200
  - API: POST /api/admin/registrations/{id}/reject
    expect: status = 200

confidence_required: 80%
common_pitfalls:
  - 重复注册未提示
  - 审批后租户未创建
