name: auth-sms
description: 短信登录/注册类需求
red_flags: [375]

business_truths:
  - 短信验证码 6 位数字，5 分钟有效
  - 登录返回 token + 用户信息
  - 注册需手机号 + 验证码 + 密码（可选）
  - 已禁用密码登录入口（#375）

primary_specs:
  - tests/e2e/specs/auth/login-sms.spec.ts
  - tests/e2e/specs/auth/register.spec.ts
  - backend/admin-api/src/test/java/com/migao/admin/controller/AuthIntegrationTest.java

reviewer_asserts:
  - API: POST /api/auth/sms/login
    expect: response.data.token 非空 AND response.data.user 含 id/name/roles
  - API: POST /api/auth/admin/login
    expect: HTTP 403 或 404（密码登录已禁用）
  - API: POST /api/auth/register
    expect: 新手机号注册成功返回 token，已注册返回 409
  - API: POST /api/auth/sms/login（过期验证码）
    expect: 返回 400/401

confidence_required: 100%

common_pitfalls:
  - 验证码未失效
  - 密码登录入口没禁用
  - token 过期时间错
