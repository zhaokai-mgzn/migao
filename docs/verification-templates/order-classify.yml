name: order-classify
description: 订单分类类需求（#390 红牌）
red_flags: [390]

business_truths:
  - 6 个状态（待付款/待发货/已发货/已完成/已关闭/退款售后）
  - 8 个分类（6 状态 + 含加工订单 + 全部）
  - 含加工订单 = 状态 NOT IN (已关闭, 退款售后) AND has_processing=true
  - 分类 tab 计数 = 列表"共 X 条"

primary_specs:
  - tests/e2e/specs/orders/order-list.spec.ts
  - tests/e2e/specs/dashboard/dashboard.spec.ts

reviewer_asserts:
  - DB: 验证各状态 count
  - API: GET /api/admin/orders?category=含加工订单
  - 分类 tab 计数与列表分页总数对得上

confidence_required: 100%

common_pitfalls:
  - 分类 tab 默认 count 用错 SQL
  - 含加工订单与待发货分类混
  - 已关闭/退款售后订单被算入含加工
