name: knowledge-ai
description: 知识库/AI 相关需求
red_flags: []

business_truths:
  - 知识库文档可上传/分类/检索
  - AI 客服基于知识库回答
  - 回答引用知识库文档

primary_specs:
  - tests/e2e/specs/knowledge/knowledge.spec.ts

reviewer_asserts:
  - DB: 验证知识库文档状态
  - API: POST /api/knowledge/search

confidence_required: 90%

common_pitfalls:
  - 文档解析失败
  - 检索不准确
  - 回答无引用
