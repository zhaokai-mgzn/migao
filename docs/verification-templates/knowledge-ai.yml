name: knowledge-ai
description: 知识库/AI 相关需求
red_flags: []

business_truths:
  - 知识库文档可上传/分类/检索
  - AI 客服基于知识库回答
  - 回答引用知识库文档

primary_specs:
  - tests/e2e/specs/knowledge/knowledge.spec.ts
  - backend/ai-agent-service/tests/test_knowledge_search.py

gate_patterns:
  - "frontend/admin-web/src/app/*/knowledge/page.tsx"
  - "backend/ai-agent-service/app/tools/knowledge_search.py"
  - "backend/ai-agent-service/app/graph/skills/knowledge_skill.py"

reviewer_asserts:
  - API: POST /api/knowledge/search {"query": "窗帘遮光效果"}
    expect: results 非空 AND 每条含 doc_id/title/snippet
  - API: POST /api/chat/send {"message": "窗帘怎么选"}
    expect: SSE answer 中引用字段非空（指向知识库文档）
  - DB: SELECT COUNT(*) FROM knowledge_documents WHERE tenant_id = {tid}
    expect: > 0（知识库非空）

confidence_required: 90%

common_pitfalls:
  - 文档解析失败
  - 检索不准确
  - 回答无引用
