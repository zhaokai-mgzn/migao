name: file-upload
description: 文件上传/OSS存储
red_flags: []
business_truths:
  - 图片上传支持 JPG/PNG/GIF/WebP
  - 上传成功后返回可访问 URL
  - 文件类型校验：拒绝非图片文件
  - 文件大小限制
  - 双 Bucket：永久存储 vs 临时存储

primary_specs:
  - tests/e2e/specs/storage/oss-dual-bucket.spec.ts

reviewer_asserts:
  - API: POST /api/admin/files/upload
    expect: status = 200 AND data.url 非空
  - 非法文件类型: POST /api/admin/files/upload (非图片)
    expect: status >= 400
  - API: POST /api/chat/upload
    expect: status = 200 AND data.url 非空

confidence_required: 80%
common_pitfalls:
  - 文件类型校验绕过
  - 上传后 URL 不可访问
  - 临时文件未过期清理
