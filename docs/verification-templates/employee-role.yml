name: employee-role
description: 员工/角色权限类需求
red_flags: [384, 385]

business_truths:
  - 员工列表显示手机号/岗位/权限
  - 岗位 = 角色名（迁移自 role）
  - 权限列 = 权限集合（全权限时折叠为"全部权限"）
  - 租户隔离

primary_specs:
  - tests/e2e/specs/admin/employees.spec.ts
  - tests/e2e/specs/admin/roles.spec.ts
  - backend/admin-api/src/test/java/com/migao/admin/controller/AdminUserControllerTest.java

gate_patterns:
  - "frontend/admin-web/src/app/*/employees/page.tsx"
  - "frontend/admin-web/src/app/*/roles/page.tsx"
  - "backend/admin-api/src/main/java/com/migao/admin/controller/AdminUserController.java"

reviewer_asserts:
  - API: GET /api/admin/employees
    expect: items 中每条含 phone/position/permissions 字段
  - API: GET /api/admin/employees
    expect: 全权限员工 permissions 显示为"全部权限"（折叠）
  - API: GET /api/admin/employees?tenant_id={tid}
    expect: items 中每条 tenant_id = {tid}（租户隔离）
  - DB: SELECT id, role FROM users WHERE tenant_id != {request_tenant_id} LIMIT 1
    expect: 0 行（跨租户泄露检查）

confidence_required: 90%

common_pitfalls:
  - 权限列展示混乱
  - 岗位列显示 "-" 而非实际值
  - 跨租户
