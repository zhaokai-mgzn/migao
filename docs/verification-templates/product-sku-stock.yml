name: product-sku-stock
description: SKU 库存汇总类需求（#382 红牌）
red_flags: [382]

business_truths:
  - 商品库存 = 所有 SKU 库存求和
  - 低库存 = 库存 ≤ 阈值（默认 100）
  - 库存数字 = 实时数据

primary_specs:
  - tests/e2e/specs/products/product-list.spec.ts
  - backend/admin-api/src/test/java/com/migao/admin/controller/ProductControllerTest.java

reviewer_asserts:
  - API: GET /api/admin/products/{id}
  - API: GET /api/admin/products/low-stock-by-color?threshold=100
    expect: 每项 stock <= 100
    expect: data.stock = SUM(data.skus[].stock)
  - API: GET /api/admin/products/low-stock-by-color?threshold=100
    expect: 每个 item.stock <= 100
    expect: 聚合结果与商品列表库存列一致

confidence_required: 100%

common_pitfalls:
  - 库存聚合按商品而非 SKU 汇总
  - 默认阈值 100 写死
  - 跨 SKU 库存重复计算
