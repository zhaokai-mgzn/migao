name: product-sku-stock
description: 商品状态/库存/编辑类需求 — 覆盖状态机、SKU 库存、列表筛选、编辑表单、数据迁移
red_flags: [382]

business_truths:
  - 商品库存 = 所有 SKU 库存求和
  - 低库存 = 库存 ≤ 阈值（默认 100）
  - 库存数字 = 实时数据
  - 商品状态流转必须合法（不允许废弃状态）

primary_specs:
  - tests/e2e/specs/products/product-list.spec.ts
  - tests/e2e/specs/products/edit-render.spec.ts
  - backend/admin-api/src/test/java/com/migao/admin/controller/ProductControllerTest.java
  - frontend/admin-web/tests/unit/pages/products

reviewer_asserts:
  # ── 商品列表与筛选 ──
  - API: GET /api/admin/products?page=1&size=5
    expect: data.records 非空
    expect: 每项 status != deleted
    expect: 每项 status NOT IN (in_warehouse)
  - API: GET /api/admin/products?page=1&size=50
    expect: 所有 item.status NOT IN (in_warehouse)

  # ── 商品详情与状态 ──
  - API: GET /api/admin/products/{id}
    expect: data.status NOT IN (in_warehouse)
    expect: data.status IN (on_sale, off_sale, draft, under_review)

  # ── 状态流转：正向 ──
  - API: PUT /api/admin/products/{id}/status
    expect: 允许 draft → on_sale
    expect: 允许 draft → under_review
    expect: 允许 on_sale → off_sale
    expect: 允许 off_sale → on_sale

  # ── 状态流转：禁止废弃状态 ──
  - API: PUT /api/admin/products/{id}/status?target=in_warehouse
    expect: status >= 400
    expect: error.message 包含 in_warehouse 或 IllegalStatus

  # ── 编辑表单：按钮校验 ──
  - API: GET /api/admin/products/{id}
    expect: data 不含 submit_to_warehouse 按钮配置

  # ── 库存聚合 ──
  - API: GET /api/admin/products/{id}
    expect: data.stock = SUM(data.skus[].stock)
  - API: GET /api/admin/products/low-stock-by-color?threshold=100
    expect: 每项 stock <= 100

  # ── 数据库迁移 ──
  - DB: psql -c "SELECT COUNT(*) FROM products WHERE status='in_warehouse'"
    expect: 返回 0
  - DB: psql -c "SELECT COUNT(*) FROM flyway_schema_history WHERE version='V4'"
    expect: 返回 1

  # ── 租户隔离 ──
  - API: GET /api/admin/products?page=1&size=5
    expect: 所有 item.tenantId = {当前租户}

confidence_required: 90%

common_pitfalls:
  - 商品状态枚举包含已废弃的 in_warehouse
  - 状态流转遗漏 in_warehouse 禁止规则
  - 编辑表单仍渲染「提交并放入仓库」按钮
  - 筛选下拉仍含「仓库中」选项
  - 库存聚合按商品而非 SKU 汇总
  - 默认阈值 100 写死
  - 跨 SKU 库存重复计算
  - V4 migration 未做幂等（重复执行不报错）
  - TypeScript ProductStatus 联合类型未移除 in_warehouse
