name: aftersales-flow
description: 售后流程类需求
red_flags: []

business_truths:
  - 售后状态流转：待处理 → 处理中 → 已完成/已关闭
  - 售后列表按状态筛选
  - 售后详情显示原订单/处理人/时间线
  - 客户创建售后工单 → 必须关联已有订单号，只能创建自己的工单
  - 客户只能看到自己的售后 → tenant_id + customer_id 双重隔离
  - 售后创建前必须弹确认卡片 → 不确认不执行
  - 客户说转人工 → 自动创建工单并通知管理员
  - 客户创建订单须通过手机号验证身份 → 只能创建自己订单
  - 不同渠道欢迎语独立配置 → 微信/抖音/H5/Web 各有专属欢迎语
  - 企业自定义机器人名称和欢迎语 → 优先使用租户 AI 配置

primary_specs:
  - tests/e2e/specs/after-sales/after-sales-list.spec.ts
  - tests/e2e/specs/after-sales/after-sales-detail.spec.ts
  - backend/admin-api/src/test/java/com/migao/admin/controller/AfterSalesControllerTest.java

reviewer_asserts:
  - API: GET /api/admin/after-sales/{id}
    expect: data.status IN (待处理,处理中,已完成,已关闭) AND data.orderNo 非空 AND data.timeline 正序
  - API: GET /api/admin/after-sales?status=待处理
    expect: items 中每条 status = 待处理
  - API: GET /api/admin/after-sales?status=处理中
    expect: items 中每条 status = 处理中
  - API: GET /api/admin/after-sales?status=已完成
    expect: items 中每条 status = 已完成
  - API: GET /api/admin/after-sales?status=已关闭
    expect: items 中每条 status = 已关闭
  - "状态分布一致性: 各 status tab 计数与对应筛选列表 total 一致"
  - API: GET /api/admin/after-sales/{id}
    expect: data.timeline 正序 AND data.timeline[0].status = 待处理
  - "租户隔离: GET /api/admin/after-sales/{id}(跨租户) → expect 403 或空数据"
  - API: POST /api/auth/sms/send
    expect: 200 AND 短信发送成功
  - API: POST /api/auth/sms/login
    expect: 200 AND data.token 非空
  - API: POST /api/admin/orders
    expect: 200 AND data.id 非空 AND data.customerPhone 符合手机号格式
  - "渠道欢迎语独立: GET /api/admin/tenant/ai-config → expect data.channelConfigs 非空 AND 微信/抖音/H5/Web 各有独立欢迎语"
  - "租户 AI 配置: GET /api/admin/tenant/ai-config → expect data.botName 非空 AND data.greetingTemplate 非空"
  - "租户 AI 配置可更新: PUT /api/admin/tenant/ai-config → expect 200 AND data.botName 非空 AND data.greetingTemplate 非空"

confidence_required: 90%

common_pitfalls:
  - 状态机跳转非法
  - 租户隔离
  - 时间线顺序错
