name: frontend-fix
description: 纯前端 UI 修复/Bug — 不涉及后端 API/SQL/状态机变更。E2E + vitest 为主。
red_flags: []

business_truths:
  - 前端 UI 变更不影响后端 API 契约
  - 变更后 E2E 测试全部通过
  - TypeScript 编译通过

primary_specs:
  - tests/e2e/specs/
  - frontend/admin-web/tests/unit/

reviewer_asserts:
  # ── 前端变更核心验证 ──
  - E2E: 变更页面 DOM 元素存在/不存在断言（按 CONTRACT_JSON 逐条验证）
  - E2E: 交互流程 happy path（点击→响应→状态变化）
  - tsc: npx tsc --noEmit 通过
  - vitest: npx vitest run 通过
  - E2E: 跨浏览器兼容（chromium webkit firefox）

  # ── API 契约不变验证 ──
  - API: GET /api/admin/settings
    expect: 响应结构未变（status=200, data 存在）
  - API: GET /api/admin/products?page=1&size=5
    expect: 响应结构未变

confidence_required: 80%

common_pitfalls:
  - 只改了 UI 文案但忘了更新对应 E2E 断言
  - onClick 绑定丢失或不生效
  - CSS class 重构导致 DOM 选择器失效
  - TypeScript 类型变更导致其他页面编译失败
  - 错误修改了 API 接口而非纯前端 UI
