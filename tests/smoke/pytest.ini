[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    p0: P0 冒烟测试（上线必须通过）
    p1: P1 回归测试
    performance: 性能基线测试
    auth: 认证链路测试
    business: 核心业务 API 测试
    ai_chat: AI 对话链路测试
    tenant: 多租户隔离测试
    health: 健康检查测试
timeout = 60
