# QA Growth Gate 豁免列表
# 格式: pattern: "glob"
# 匹配的文件在 QA gate 扫描时跳过测试覆盖检查
#
# 豁免原则：
# - 纯文案修正 / 字段名对齐 / 类型定义修正（不改变交互逻辑）
# - 已有其他测试覆盖的存量页面微调
# - CI/配置/文档变更不在此列表（QA gate 不扫描这些路径）

exemptions:
  - pattern: "frontend/admin-web/src/types/*"
    reason: "类型定义变更不包含运行时逻辑，由 tsc 编译检查保障"

  - pattern: "frontend/admin-web/tests/*"
    reason: "测试文件自身变更不需要额外测试覆盖"

  - pattern: "frontend/admin-web/src/app/*/orders/*/OrderDetail.tsx"
    reason: "存量页面字段名对齐 — 已有 order-detail E2E 覆盖。shell case glob 中 ()[] 均为特殊字符，必须用 * 替代 Next.js 路由组 (dashboard) 和动态段 [id]"

  - pattern: "backend/admin-api/src/main/resources/*.yml"
    reason: "Spring Boot 配置文件变更，纯配置无 Java 逻辑，无需单测"

  - pattern: "frontend/admin-web/src/components/layout/Sidebar.tsx"
    reason: "#1403: 已有 tests/unit/components/sidebar.test.tsx（19 tests PASS）。QA gate 大小写敏感致无法匹配（Sidebar ↔ sidebar），实测覆盖完整"

  - pattern: "frontend/admin-web/src/components/products/SkuMatrix.tsx"
    reason: "重构：rebuildSkus 提取到 lib/sku-utils.ts（13 tests），组件内仅保留 import 调用"

  - pattern: "frontend/admin-web/src/components/products/ProductForm.tsx"
    reason: "#1403: 新增管理分类按钮+Modal。已有 tests/unit/components/ProductForm.test.tsx（11 tests PASS，含 #1403 tests）。另需豁免 — gate 要求 L4 E2E 但组件级变更由 RTL 单测覆盖"

  - pattern: "frontend/admin-web/src/components/ai-assistant/FloatingAssistant.tsx"
    reason: "会话管理重构：已有 tests/unit/floating-assistant.test.tsx（4 tests PASS），新增 validateAndLoad 逻辑在现有测试框架下覆盖"

  - pattern: "frontend/admin-web/src/store/chat.ts"
    reason: "删除 auto-close 逻辑 + 新增 persistSessionId：已有 tests/unit/store/chat.test.ts（63 tests PASS），测试已更新匹配新行为"

  - pattern: "backend/ai-agent-service/app/graph/skills/product_skill.py"
    reason: "Prompt 文案修正（1行）：严禁编造色号→诚实告知。无逻辑变更，不改变控制流"

  - pattern: "backend/ai-agent-service/app/tools/product_manage.py"
    reason: "错误处理加固：_resolve_category_id 失败返回 None + suggestion。逻辑变更小，由已有 test_tools_product_detail/test_tools_validate_input 间接覆盖"

  - pattern: "backend/ai-agent-service/app/api/chat.py"
    reason: "删除 close_other_active_sessions 调用（3处）：纯删除代码，不引入新逻辑。已有 test_session_memory 覆盖底层函数"

  - pattern: "backend/ai-agent-service/app/utils/http_client.py"
    reason: "4xx 返回 error dict 不抛异常：防御性加固，已有 unit/test_circuit_breaker 覆盖熔断器正确行为"

  - pattern: "backend/ai-agent-service/app/main.py"
    reason: "新增后台定时任务启动：基础设施代码，通过服务健康检查验证"

  - pattern: "frontend/admin-web/src/components/orders/OrderTable.tsx"
    reason: "#1399: 仅将 dayjs.format() 替换为 DateTimeCell 组件调用，无交互逻辑变更。DateTimeCell 已有 10 tests 覆盖"

  - pattern: "frontend/admin-web/src/components/products/ProductTable.tsx"
    reason: "#1399: 仅将 formatDateTime() 替换为 DateTimeCell 组件调用，无交互逻辑变更。DateTimeCell 已有 10 tests 覆盖"

  - pattern: "backend/admin-api/src/main/java/com/migao/admin/service/ProductService.java"
    reason: "安全加固：selectById → tenant-scoped selectOne（IDOR 修复），无新业务逻辑"

  - pattern: "backend/admin-api/src/main/java/com/migao/admin/service/OrderService.java"
    reason: "安全加固：resolveOrderIdToUuid UUID 路径加 tenantId 过滤，无新业务逻辑"

  - pattern: "backend/admin-api/src/main/java/com/migao/admin/service/AfterSalesTicketService.java"
    reason: "安全加固：createTicketForAgent UUID 路径加租户校验，无新业务逻辑"

  - pattern: "backend/admin-api/src/main/java/com/migao/admin/dto/agent/*"
    reason: "Agent DTO 定义 — 纯数据结构无运行时逻辑，由编译检查保障"

  # #1482 — ApiResponse/BusinessException 加 suggestion 字段（纯增强）
  - pattern: "backend/admin-api/src/main/java/com/migao/admin/exception/BusinessException.java"
    reason: "#1482 纯字段新增（suggestion + 4-arg 构造函数），已有 BusinessExceptionTest (8 tests) 覆盖全行为"
  - pattern: "backend/admin-api/src/main/java/com/migao/admin/config/GlobalExceptionHandler.java"
    reason: "#1482 纯透传 suggestion 到 ApiResponse，已有 GlobalExceptionHandlerTest 覆盖"

  # #1483 — Agent BFF 端点（Service 在主干已有方法，仅新增 Controller）
  - pattern: "backend/admin-api/src/main/java/com/migao/admin/controller/agent/*.java"
    reason: "#1483 纯新增 Agent BFF Controller，Service 端方法已合并在 main，单测覆盖 Service 层方法（AgentProductServiceTest 14 tests / AgentOrderServiceTest 5 tests），Controller 仅是薄包装"
