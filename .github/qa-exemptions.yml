# QA Growth Gate 豁免配置
# ===========================
# 匹配这些 pattern 的文件跳过测试覆盖检查。
#
# 豁免类型：
#   legacy       - 预存代码，待测试迁移（需 PR review 审批）
#   migration    - 一次性迁移/重命名（自动允许）
#   config       - 纯配置变更，无业务逻辑（自动允许）
#   tool-script  - 构建/部署/CI 脚本，不发布到生产（自动允许）
#
# ⚠️ legacy 豁免会降低质量门禁，必须通过 PR review 审批。
# ⏰ legacy 豁免有过期时间，过期后需重新评审或补测。
#
# 格式示例：
# - pattern: "backend/admin-api/src/main/java/.../LegacyController.java"
#   type: legacy
#   reason: "预存代码，仅做路由转发无业务逻辑。Issue #xxx 跟踪补测。"
#   expires: "2026-09-01"

exemptions: []
