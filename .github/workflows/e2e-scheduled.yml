name: E2E Scheduled

on:
  schedule:
    # 每天凌晨 2:00（北京时间 10:00 UTC）
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PLAYWRIGHT_BROWSERS_PATH: '0'

jobs:
  e2e:
    name: Full E2E Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: tests
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        working-directory: tests
        env:
          BASE_URL: ${{ secrets.E2E_BASE_URL || 'https://admin.migaozn.com' }}
          E2E_ADMIN_PHONE: ${{ secrets.E2E_ADMIN_PHONE || '13800138000' }}
          E2E_SMS_CODE: ${{ secrets.E2E_SMS_CODE || '123456' }}
        run: |
          npx playwright test \
            --reporter=list \
            --retries=2 \
            --max-failures=10

      - name: Upload test artifacts (failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: |
            tests/playwright-report/
            tests/test-results/

      - name: Create Issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[E2E] 定时巡检失败 — ${new Date().toISOString().slice(0, 10)}`,
              body: `E2E 定时测试失败。\n\n查看详情：${runUrl}`,
              labels: ['bug', 'e2e'],
            })
