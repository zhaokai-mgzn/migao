name: E2E Web

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'frontend/admin-web/**'
      - 'backend/admin-api/**'
      - 'tests/e2e/specs/**'
      - 'tests/e2e/.auth/**'
      - 'tests/playwright.config.ts'
      - 'tests/package.json'
      - 'tests/package-lock.json'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: '20'

jobs:
  e2e-web:
    name: E2E Web (specs only, no LLM)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # ═══════════════════════════════════════════════════════
      # 安装前端依赖（Next.js dev server 在 CI 里本地启动）
      # ═══════════════════════════════════════════════════════
      - name: Install frontend dependencies
        working-directory: frontend/admin-web
        run: npm ci

      # ═══════════════════════════════════════════════════════
      # 安装 E2E 测试依赖
      # ═══════════════════════════════════════════════════════
      - name: Install test dependencies
        working-directory: tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: tests
        run: npx playwright install chromium --with-deps

      # ═══════════════════════════════════════════════════════
      # Record-Replay: 从远程 dev 录制 API fixtures
      # ═══════════════════════════════════════════════════════
      - name: Record API fixtures
        working-directory: tests
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.E2E_API_BASE_URL || 'http://8.136.139.170' }}
          E2E_ADMIN_PHONE: ${{ secrets.E2E_ADMIN_PHONE || '13800138000' }}
          E2E_SMS_CODE: ${{ secrets.E2E_SMS_CODE || '123456' }}
        run: npx tsx e2e/scripts/record-fixtures.ts
        continue-on-error: true

      # ═══════════════════════════════════════════════════════
      # 运行 E2E Web 测试
      #
      # Playwright 自动启动 Next.js dev server（见 playwright.config.ts webServer）
      # 前端 API 请求直连远程 admin-api（NEXT_PUBLIC_API_BASE_URL）
      # ═══════════════════════════════════════════════════════
      - name: Run E2E tests (web only)
        continue-on-error: true  # 逐步完善中，先不阻塞
        working-directory: tests
        env:
          BASE_URL: http://localhost:3001
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.E2E_API_BASE_URL || 'http://8.136.139.170' }}
          E2E_ADMIN_PHONE: ${{ secrets.E2E_ADMIN_PHONE || '13800138000' }}
          E2E_SMS_CODE: ${{ secrets.E2E_SMS_CODE || '123456' }}
          CI: 'true'
        run: |
          npx playwright test --project=web \
            --reporter=list \
            --retries=2 \
            --max-failures=999

      # E2E 持续完善中，当前不阻塞 PR（continue-on-error）
      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-web-artifacts
          path: |
            tests/playwright-report/
            tests/test-results/
