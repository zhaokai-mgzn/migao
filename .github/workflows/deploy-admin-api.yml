name: Build and Deploy admin-api

on:
  push:
    branches:
      - main
    paths:
      - 'backend/admin-api/**'
  workflow_dispatch:  # 支持手动触发

env:
  SAE_APP_ID: d6a22f49-0c01-48fc-8d0a-7254284a6a16
  SAE_REGION: cn-hangzhou
  OSS_BUCKET: ai-customer-service-admin-dev
  OSS_OBJECT_KEY: deploy/admin-api.jar
  OSS_ENDPOINT: oss-cn-hangzhou.aliyuncs.com
  HEALTH_CHECK_URL: https://admin-api.migaozn.com/actuator/health

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    concurrency:
      group: deploy-admin-api
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build admin-api with Maven
        working-directory: backend/admin-api
        run: |
          mvn clean package -DskipTests -q
          # 定位产物 JAR（兼容版本号变更）
          JAR_FILE=$(ls target/admin-api-*.jar | grep -v sources | grep -v javadoc | head -n 1)
          if [ -z "$JAR_FILE" ]; then
            echo "❌ 未找到构建产物 JAR"
            ls -la target/
            exit 1
          fi
          echo "✅ 构建成功：$JAR_FILE"
          echo "JAR_FILE=backend/admin-api/$JAR_FILE" >> $GITHUB_ENV

      - name: Install Aliyun CLI
        run: |
          curl -sL https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz -o aliyun-cli.tgz
          tar xzf aliyun-cli.tgz
          sudo mv aliyun /usr/local/bin/

      - name: Configure Aliyun credentials
        run: |
          aliyun configure set \
            --access-key-id ${{ secrets.ALIYUN_ACCESS_KEY_ID }} \
            --access-key-secret ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }} \
            --region ${{ env.SAE_REGION }}

      - name: Upload JAR to OSS
        run: |
          echo "上传 JAR 到 OSS：oss://${{ env.OSS_BUCKET }}/${{ env.OSS_OBJECT_KEY }}"
          aliyun oss cp "$JAR_FILE" "oss://${{ env.OSS_BUCKET }}/${{ env.OSS_OBJECT_KEY }}" \
            --force \
            --region ${{ env.SAE_REGION }}
          echo "✅ JAR 上传完成"

      - name: Sign OSS PackageUrl
        id: sign
        run: |
          # SAE DeployApplication 必须使用新签名 URL，旧签名会过期
          SIGNED_URL=$(aliyun oss sign "oss://${{ env.OSS_BUCKET }}/${{ env.OSS_OBJECT_KEY }}" \
            --timeout 86400 \
            --region ${{ env.SAE_REGION }} \
            --endpoint ${{ env.OSS_ENDPOINT }} | tail -n 1)
          if [ -z "$SIGNED_URL" ]; then
            echo "❌ OSS 签名失败"
            exit 1
          fi
          echo "✅ 已签名 OSS URL"
          # 通过文件传递 URL（含特殊字符），避免在日志中打印
          echo "$SIGNED_URL" > /tmp/signed_url.txt
          echo "SIGNED_URL_FILE=/tmp/signed_url.txt" >> $GITHUB_ENV

      - name: Wait for previous SAE change to finish
        run: |
          echo "检查是否有进行中的变更..."
          MAX_WAIT=120
          START_TIME=$(date +%s)
          while true; do
            RESULT=$(aliyun sae DescribeApplicationStatus --AppId ${{ env.SAE_APP_ID }})
            RUNNING=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('Data',{}).get('LastChangeOrderRunning',''))" 2>/dev/null || echo "unknown")

            if [ "$RUNNING" = "false" ] || [ "$RUNNING" = "False" ]; then
              echo "✅ 没有进行中的变更，开始部署"
              break
            fi

            CURRENT_TIME=$(date +%s)
            ELAPSED=$((CURRENT_TIME - START_TIME))
            if [ $ELAPSED -gt $MAX_WAIT ]; then
              echo "❌ 等待超时（${MAX_WAIT}s），仍有变更在进行"
              exit 1
            fi

            echo "⏳ 有变更在进行中，等待... ($ELAPSED/${MAX_WAIT}s)"
            sleep 10
          done

      - name: Deploy to SAE
        run: |
          # 获取当前完整环境变量（全量重发，避免清空已有配置）
          ENVS=$(aliyun sae DescribeApplicationConfig \
            --AppId ${{ env.SAE_APP_ID }} | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('Data',{}).get('Envs','[]'))")

          SIGNED_URL=$(cat "$SIGNED_URL_FILE")

          # 部署 FatJar
          aliyun sae DeployApplication \
            --AppId ${{ env.SAE_APP_ID }} \
            --PackageUrl "$SIGNED_URL" \
            --PackageType FatJar \
            --Envs "$ENVS"

          echo "✅ 部署已触发，PackageType=FatJar"

      - name: Verify deployment
        run: |
          echo "等待 SAE 变更完成..."
          MAX_WAIT=300
          START_TIME=$(date +%s)
          while true; do
            RESULT=$(aliyun sae DescribeApplicationStatus --AppId ${{ env.SAE_APP_ID }})
            RUNNING=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('Data',{}).get('LastChangeOrderRunning',''))" 2>/dev/null || echo "unknown")

            if [ "$RUNNING" = "false" ] || [ "$RUNNING" = "False" ]; then
              echo "✅ 变更已完成"
              break
            fi

            CURRENT_TIME=$(date +%s)
            ELAPSED=$((CURRENT_TIME - START_TIME))
            if [ $ELAPSED -gt $MAX_WAIT ]; then
              echo "⚠️ 变更仍在进行，继续做健康检查..."
              break
            fi

            echo "⏳ 等待变更完成... ($ELAPSED/${MAX_WAIT}s)"
            sleep 15
          done

          sleep 30
          echo "执行健康检查：${{ env.HEALTH_CHECK_URL }}"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.HEALTH_CHECK_URL }}")
          echo "健康检查响应码: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ 健康检查失败"
            exit 1
          fi
          echo "✅ 部署成功，服务健康"
