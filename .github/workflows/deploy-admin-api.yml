name: Build and Deploy admin-api

on:
  push:
    branches:
      - main
    paths:
      - 'backend/admin-api/**'
  workflow_dispatch:  # 支持手动触发

env:
  SAE_APP_ID: d6a22f49-0c01-48fc-8d0a-7254284a6a16
  SAE_REGION: cn-hangzhou
  OSS_BUCKET: ai-customer-service-admin-dev
  OSS_OBJECT_KEY: deploy/admin-api.jar
  OSS_ENDPOINT: oss-cn-hangzhou.aliyuncs.com
  # 健康检查直接命中 SAE Internet SLB IP（HTTP:80 → TargetPort 8080）+ Host header
  # 域名 admin-api.migaozn.com 的 DNS A 记录尚未配置（需控制台操作，独立 Issue 跟踪）
  HEALTH_CHECK_HOST: admin-api.migaozn.com
  HEALTH_CHECK_IP: 8.136.139.170
  HEALTH_CHECK_PATH: /actuator/health

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    concurrency:
      group: deploy-admin-api
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run unit tests
        working-directory: backend/admin-api
        run: |
          mvn test -q \
            -Dtest='!TenantIsolationTest,!SecurityConfigTest'

      - name: Build admin-api with Maven
        working-directory: backend/admin-api
        run: |
          mvn clean package -DskipTests -q
          # 定位产物 JAR（兼容版本号变更）
          JAR_FILE=$(ls target/admin-api-*.jar | grep -v sources | grep -v javadoc | head -n 1)
          if [ -z "$JAR_FILE" ]; then
            echo "❌ 未找到构建产物 JAR"
            ls -la target/
            exit 1
          fi
          echo "✅ 构建成功：$JAR_FILE"
          echo "JAR_FILE=backend/admin-api/$JAR_FILE" >> $GITHUB_ENV

      - name: Install Aliyun CLI
        run: |
          curl -sL https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz -o aliyun-cli.tgz
          tar xzf aliyun-cli.tgz
          sudo mv aliyun /usr/local/bin/

      - name: Configure Aliyun credentials
        run: |
          aliyun configure set \
            --access-key-id ${{ secrets.ALIYUN_ACCESS_KEY_ID }} \
            --access-key-secret ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }} \
            --region ${{ env.SAE_REGION }}

      - name: Upload JAR to OSS
        run: |
          echo "上传 JAR 到 OSS：oss://${{ env.OSS_BUCKET }}/${{ env.OSS_OBJECT_KEY }}"
          aliyun oss cp "$JAR_FILE" "oss://${{ env.OSS_BUCKET }}/${{ env.OSS_OBJECT_KEY }}" \
            --force \
            --region ${{ env.SAE_REGION }}
          echo "✅ JAR 上传完成"

      - name: Sign OSS PackageUrl
        id: sign
        run: |
          # SAE DeployApplication 必须使用新签名 URL，旧签名会过期
          # aliyun oss sign 输出多行，最后一行是 "0.000xxx(s) elapsed"，URL 为以 http(s):// 开头的那一行
          SIGN_OUTPUT=$(aliyun oss sign "oss://${{ env.OSS_BUCKET }}/${{ env.OSS_OBJECT_KEY }}" \
            --timeout 86400 \
            --region ${{ env.SAE_REGION }} \
            --endpoint ${{ env.OSS_ENDPOINT }})
          SIGNED_URL=$(echo "$SIGN_OUTPUT" | grep -E '^https?://' | head -n 1)
          if [ -z "$SIGNED_URL" ]; then
            echo "❌ OSS 签名失败，完整输出："
            echo "$SIGN_OUTPUT"
            exit 1
          fi
          echo "✅ 已签名 OSS URL（长度：${#SIGNED_URL}）"
          # 通过文件传递 URL（含特殊字符），避免在日志中打印
          echo "$SIGNED_URL" > /tmp/signed_url.txt
          echo "SIGNED_URL_FILE=/tmp/signed_url.txt" >> $GITHUB_ENV

      - name: Wait for previous SAE change to finish
        run: |
          echo "检查是否有进行中的变更..."
          MAX_WAIT=120
          START_TIME=$(date +%s)
          while true; do
            RESULT=$(aliyun sae DescribeApplicationStatus --AppId ${{ env.SAE_APP_ID }})
            RUNNING=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('Data',{}).get('LastChangeOrderRunning',''))" 2>/dev/null || echo "unknown")

            if [ "$RUNNING" = "false" ] || [ "$RUNNING" = "False" ]; then
              echo "✅ 没有进行中的变更，开始部署"
              break
            fi

            CURRENT_TIME=$(date +%s)
            ELAPSED=$((CURRENT_TIME - START_TIME))
            if [ $ELAPSED -gt $MAX_WAIT ]; then
              echo "❌ 等待超时（${MAX_WAIT}s），仍有变更在进行"
              exit 1
            fi

            echo "⏳ 有变更在进行中，等待... ($ELAPSED/${MAX_WAIT}s)"
            sleep 10
          done

      - name: Deploy to SAE
        run: |
          # 获取当前完整环境变量（全量重发，避免清空已有配置）
          # 写入临时文件，规避特殊字符（@、!、$、&）在 shell 命令行中的解析问题
          ENVS_FILE=/tmp/sae_envs.json
          aliyun sae DescribeApplicationConfig \
            --AppId ${{ env.SAE_APP_ID }} \
            | jq -r '.Data.Envs // "[]"' \
            | jq -c '.' > "$ENVS_FILE"

          if [ ! -s "$ENVS_FILE" ]; then
            echo "❌ 获取 SAE 环境变量失败"
            exit 1
          fi

          echo "✅ 已获取 SAE 环境变量（条目数：$(jq 'length' "$ENVS_FILE")）"

          # 使用 Python subprocess 直接 execvp 调用 aliyun CLI
          # 参数以 list 传入，完全绕过 shell 解析，避免特殊字符（OSS URL 中的 &、密码中的 @!$）被截断或误解析
          python3 <<'PYEOF'
          import json, os, subprocess, sys

          with open('/tmp/sae_envs.json', 'r', encoding='utf-8') as f:
              envs_raw = f.read().strip()
          with open(os.environ['SIGNED_URL_FILE'], 'r', encoding='utf-8') as f:
              signed_url = f.read().strip()

          # 校验 envs 是合法 JSON 数组并紧凑序列化
          envs = json.loads(envs_raw)
          if not isinstance(envs, list):
              print(f'❌ Envs 必须是数组，实际类型：{type(envs).__name__}', file=sys.stderr)
              sys.exit(1)
          envs_compact = json.dumps(envs, ensure_ascii=False, separators=(',', ':'))

          if not signed_url.startswith('http'):
              print(f'❌ SIGNED_URL 不是合法 HTTP URL：{signed_url[:80]}', file=sys.stderr)
              sys.exit(1)

          cmd = [
              'aliyun', 'sae', 'DeployApplication',
              '--AppId', os.environ['SAE_APP_ID'],
              '--PackageUrl', signed_url,
              '--PackageType', 'FatJar',
              '--Envs', envs_compact,
          ]
          print(f'📤 调用 aliyun sae DeployApplication（envs 条目数：{len(envs)}，PackageUrl 长度：{len(signed_url)}）')
          result = subprocess.run(cmd, capture_output=True, text=True)
          if result.stdout:
              print('STDOUT:', result.stdout)
          if result.returncode != 0:
              print('STDERR:', result.stderr, file=sys.stderr)
              sys.exit(result.returncode)
          if result.stderr:
              print('STDERR:', result.stderr)
          PYEOF

          echo "✅ 部署已触发，PackageType=FatJar"

      - name: Verify deployment
        run: |
          echo "等待 SAE 变更完成..."
          MAX_WAIT=300
          START_TIME=$(date +%s)
          while true; do
            RESULT=$(aliyun sae DescribeApplicationStatus --AppId ${{ env.SAE_APP_ID }})
            RUNNING=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('Data',{}).get('LastChangeOrderRunning',''))" 2>/dev/null || echo "unknown")

            if [ "$RUNNING" = "false" ] || [ "$RUNNING" = "False" ]; then
              echo "✅ 变更已完成"
              break
            fi

            CURRENT_TIME=$(date +%s)
            ELAPSED=$((CURRENT_TIME - START_TIME))
            if [ $ELAPSED -gt $MAX_WAIT ]; then
              echo "⚠️ 变更仍在进行，继续做健康检查..."
              break
            fi

            echo "⏳ 等待变更完成... ($ELAPSED/${MAX_WAIT}s)"
            sleep 15
          done

          sleep 30
          # 直连 SAE 公网 SLB IP，避免 admin-api.migaozn.com DNS 缺失导致 curl exit 6
          TARGET_URL="http://${HEALTH_CHECK_IP}${HEALTH_CHECK_PATH}"
          echo "执行健康检查：${TARGET_URL} (Host: ${HEALTH_CHECK_HOST})"
          HTTP_CODE=$(curl -s -o /tmp/health.txt -w "%{http_code}" -m 15 \
            -H "Host: ${HEALTH_CHECK_HOST}" "${TARGET_URL}" || echo "000")
          echo "健康检查响应码: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ 健康检查失败，响应内容："
            cat /tmp/health.txt 2>/dev/null || true
            exit 1
          fi
          echo "✅ 部署成功，服务健康"
          cat /tmp/health.txt | head -c 500 && echo

  smoke-test:
    name: Post-Deploy Smoke Test
    needs: build-and-deploy
    uses: ./.github/workflows/smoke-test.yml
    with:
      admin_api_url: 'http://8.136.139.170'
      ai_agent_url: 'https://ai-api.migaozn.com'
    secrets:
      SMOKE_ADMIN_PASSWORD: ${{ secrets.SMOKE_ADMIN_PASSWORD }}
      SMOKE_SERVICE_TOKEN: ${{ secrets.SMOKE_SERVICE_TOKEN }}
