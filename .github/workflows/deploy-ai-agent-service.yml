name: Build and Deploy ai-agent-service

on:
  push:
    branches:
      - main
    paths:
      - 'backend/ai-agent-service/**'
  workflow_dispatch:  # 支持手动触发

env:
  ACR_REGISTRY: crpi-qdcgkzwx9p9zckga.cn-hangzhou.personal.cr.aliyuncs.com
  ACR_NAMESPACE: ai-customer-service
  IMAGE_NAME: ai-agent-service
  SAE_APP_ID: 01c0759f-4a81-494f-9947-0113d38b86c2
  SAE_REGION: cn-hangzhou

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    concurrency:
      group: deploy-ai-agent-service
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=v$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Login to Alibaba Cloud ACR
        run: |
          docker login ${{ env.ACR_REGISTRY }} \
            --username ${{ secrets.ACR_USERNAME }} \
            --password ${{ secrets.ACR_PASSWORD }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run unit tests
        working-directory: backend/ai-agent-service
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY || 'ci-dummy-key' }}
          DASHSCOPE_BASE_URL: https://dashscope.aliyuncs.com/compatible-mode/v1
          DASHSCOPE_MODEL: qwen3.7-max
          DASHSCOPE_EMBEDDING_MODEL: text-embedding-v3
          DASHVECTOR_API_KEY: ci-dummy
          DASHVECTOR_ENDPOINT: https://ci-dummy.dashvector.cn-hangzhou.aliyuncs.com
          DASHVECTOR_COLLECTION: ci
          ADMIN_API_BASE_URL: http://localhost:8080
          SERVICE_TOKEN: ci-dummy
          JWT_PUBLIC_KEY: ci-dummy
          LOGISTICS_API_URL: https://ci-dummy
          LOGISTICS_APPCODE: ci-dummy
          SSE_TIMEOUT: '300'
          SSE_PING_INTERVAL: '30'
          CORS_ALLOWED_ORIGINS: http://localhost:3000
        run: |
          pip install -r requirements.txt -q
          python -m pytest tests/ -v --tb=short -q \
            --ignore=tests/test_post_deploy_verify.py \
            --ignore=tests/manual_test_pe_flow.py \
            -m "not integration" 

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        working-directory: backend/ai-agent-service
        run: |
          IMAGE_FULL=${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.IMAGE_TAG }}
          docker buildx build \
            --build-arg PIP_INDEX_URL=https://pypi.org/simple/ \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            -t $IMAGE_FULL --push .
          echo "IMAGE_FULL=$IMAGE_FULL" >> $GITHUB_ENV

      - name: Install Aliyun CLI
        run: |
          curl -sL https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz -o aliyun-cli.tgz
          tar xzf aliyun-cli.tgz
          sudo mv aliyun /usr/local/bin/

      - name: Deploy to SAE
        run: |
          # 配置凭证
          aliyun configure set \
            --access-key-id ${{ secrets.ALIYUN_ACCESS_KEY_ID }} \
            --access-key-secret ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }} \
            --region ${{ env.SAE_REGION }}

          # 等待前一个变更完成
          echo "检查是否有进行中的变更..."
          MAX_WAIT=120
          START_TIME=$(date +%s)
          while true; do
            RESULT=$(aliyun sae DescribeApplicationStatus --AppId ${{ env.SAE_APP_ID }})
            RUNNING=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('Data',{}).get('LastChangeOrderRunning',''))" 2>/dev/null || echo "unknown")

            if [ "$RUNNING" = "false" ] || [ "$RUNNING" = "False" ]; then
              echo "✅ 没有进行中的变更，开始部署"
              break
            fi

            CURRENT_TIME=$(date +%s)
            ELAPSED=$((CURRENT_TIME - START_TIME))
            if [ $ELAPSED -gt $MAX_WAIT ]; then
              echo "❌ 等待超时（${MAX_WAIT}s），仍有变更在进行"
              exit 1
            fi

            echo "⏳ 有变更在进行中，等待... ($ELAPSED/${MAX_WAIT}s)"
            sleep 10
          done

          # 获取当前完整环境变量（全量，避免丢失配置）
          ENVS=$(aliyun sae DescribeApplicationConfig \
            --AppId ${{ env.SAE_APP_ID }} | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('Data',{}).get('Envs','[]'))")

          # 部署新镜像
          aliyun sae DeployApplication \
            --AppId ${{ env.SAE_APP_ID }} \
            --ImageUrl "$IMAGE_FULL" \
            --Envs "$ENVS"

          echo "✅ 部署已触发，镜像: $IMAGE_FULL"

      - name: Verify deployment
        run: |
          echo "等待 SAE 变更完成..."
          MAX_WAIT=300
          START_TIME=$(date +%s)
          while true; do
            RESULT=$(aliyun sae DescribeApplicationStatus --AppId ${{ env.SAE_APP_ID }})
            RUNNING=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('Data',{}).get('LastChangeOrderRunning',''))" 2>/dev/null || echo "unknown")

            if [ "$RUNNING" = "false" ] || [ "$RUNNING" = "False" ]; then
              echo "✅ 变更已完成"
              break
            fi

            CURRENT_TIME=$(date +%s)
            ELAPSED=$((CURRENT_TIME - START_TIME))
            if [ $ELAPSED -gt $MAX_WAIT ]; then
              echo "⚠️ 变更仍在进行，继续做健康检查..."
              break
            fi

            echo "⏳ 等待变更完成... ($ELAPSED/${MAX_WAIT}s)"
            sleep 15
          done

          sleep 30
          echo "执行健康检查..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://ai-api.migaozn.com/health)
          echo "健康检查响应码: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ 健康检查失败"
            exit 1
          fi
          echo "✅ 部署成功，服务健康"

  smoke-test:
    name: Post-Deploy Smoke Test
    needs: build-and-deploy
    uses: ./.github/workflows/smoke-test.yml
    with:
      admin_api_url: 'http://8.136.139.170'
      ai_agent_url: 'https://ai-api.migaozn.com'
    secrets:
      SMOKE_ADMIN_PASSWORD: ${{ secrets.SMOKE_ADMIN_PASSWORD }}
      SMOKE_SERVICE_TOKEN: ${{ secrets.SMOKE_SERVICE_TOKEN }}
