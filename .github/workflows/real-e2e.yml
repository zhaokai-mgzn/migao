name: Real AI E2E

on:
  workflow_call:
    inputs:
      ai_agent_url:
        description: '已部署的 ai-agent-service URL'
        type: string
        required: true
      admin_api_url:
        description: '已部署的 admin-api URL'
        type: string
        required: true
    secrets:
      E2E_REAL_SERVICE_TOKEN:
        required: true
  # ⚠️ workflow_dispatch 已移除 — 防止攻击者通过自定义 URL 截获 SERVICE_TOKEN
  # 手动触发请通过调用方 workflow（如 deploy-*）间接触发 workflow_call

jobs:
  real-e2e:
    name: Real AI E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/ai-agent-service/requirements.txt

      - name: Install dependencies
        working-directory: backend/ai-agent-service
        run: pip install -r requirements.txt -q

      - name: Run real E2E tests
        working-directory: backend/ai-agent-service
        env:
          CI: 'true'
          E2E_REAL_ENABLED: 'true'
          ADMIN_API_BASE_URL: ${{ inputs.admin_api_url }}
          AI_AGENT_URL: ${{ inputs.ai_agent_url }}
          SERVICE_TOKEN: ${{ secrets.E2E_REAL_SERVICE_TOKEN }}
        run: |
          python -m pytest tests/e2e/real/ -v --tb=long -q \
            --timeout=120 \
            --no-cov

      - name: Create Issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Real E2E] AI Agent 真实 E2E 失败 — ${new Date().toISOString().slice(0, 10)}`,
              body: `真实 AI E2E 测试失败（零 Mock，真实 LLM 调用）。\n\n查看详情：${runUrl}`,
              labels: ['bug', 'role/qa'],
            })
