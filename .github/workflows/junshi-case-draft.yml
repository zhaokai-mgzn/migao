name: junshi/case-draft

# 机械操作：needs-verification issue → 打 needs-draft 标签，等 OpenClaw Cron 1 处理

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: read
  issues: write

jobs:
  trigger:
    if: contains(github.event.issue.labels.*.name, 'needs-verification')
    runs-on: ubuntu-latest
    steps:
      - name: 打 needs-draft 标签
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue edit "$ISSUE_NUMBER" --add-label "needs-draft" 2>/dev/null || true
          echo "✅ needs-draft — 等 OpenClaw Cron 1 生成 case"
