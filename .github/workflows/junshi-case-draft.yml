name: junshi/case-draft

# 二郎神体系 v4 — CI 只打标签，远程 orchestrator 调 case-draft agent
# 瘦到极致：issue open/labeled → 加 needs-draft 标签 → 远程 cron 处理

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: read
  issues: write

jobs:
  trigger:
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'needs-verification')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: 打 needs-draft 标签，等待远程 orchestrator 处理
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue edit "$ISSUE_NUMBER" --add-label "needs-draft" 2>/dev/null || true
          echo "✅ needs-draft label added — 远程 orchestrator 将调 case-draft agent"
