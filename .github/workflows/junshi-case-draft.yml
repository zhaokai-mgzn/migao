name: junshi/case-draft

# 二郎神体系：军师检测 needs-verification issue → 自动生成 case draft

on:
  issues:
    types: [opened, labeled]
  # 手动触发修复已卡住的 issue
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to re-draft'
        required: false

permissions:
  contents: read
  issues: write

jobs:
  case-draft:
    # 仅处理带 needs-verification 标签的 issue
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'needs-verification')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyyaml
      - name: 军师生成 case draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROJECT_ROOT: ${{ github.workspace }}
        run: |
          ISSUE="${{ github.event.inputs.issue_number || github.event.issue.number }}"
          python scripts/dual_verify/case_draft.py "$ISSUE"
