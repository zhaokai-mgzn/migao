name: junshi/redraft

# 二郎神 v4 — Agent REJECT 后 CI 打 needs-draft，远程 orchestrator 调 case-draft agent

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

jobs:
  trigger:
    if: |
      contains(github.event.comment.body, '<!-- REVIEW_JSON') &&
      (contains(github.event.comment.body, '"reject"') || contains(github.event.comment.body, '"supplement"'))
    runs-on: ubuntu-latest
    steps:
      - name: 打 needs-draft 标签 + 移除 needs-redraft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue edit "$ISSUE_NUMBER" --add-label "needs-draft" --remove-label "needs-redraft" 2>/dev/null || true
          echo "✅ needs-draft added, needs-redraft removed"
