name: Build and Deploy admin-web

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/admin-web/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACR_REGISTRY: crpi-qdcgkzwx9p9zckga.cn-hangzhou.personal.cr.aliyuncs.com
  ACR_NAMESPACE: ai-customer-service
  IMAGE_NAME: admin-web
  SAE_APP_ID: 3a85fd57-f0cf-489b-a223-ca690dfb9fd2
  SAE_REGION: cn-hangzhou
  WORKING_DIR: frontend/admin-web

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    concurrency:
      group: deploy-admin-web
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=v$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Login to Alibaba Cloud ACR
        run: |
          docker login ${{ env.ACR_REGISTRY }} \
            --username ${{ secrets.ACR_USERNAME }} \
            --password ${{ secrets.ACR_PASSWORD }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci

      - name: TypeScript type check
        working-directory: ${{ env.WORKING_DIR }}
        run: npx tsc --noEmit

      - name: Run unit tests
        working-directory: ${{ env.WORKING_DIR }}
        run: npx vitest run

      - name: Build and push Docker image
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL || 'https://api.migaozn.com' }} \
            --build-arg NEXT_PUBLIC_AI_API_BASE_URL=${{ secrets.NEXT_PUBLIC_AI_API_BASE_URL || 'https://ai-api.migaozn.com' }} \
            --build-arg NEXT_PUBLIC_COOKIE_DOMAIN=${{ secrets.NEXT_PUBLIC_COOKIE_DOMAIN || '.migaozn.com' }} \
            -t ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.IMAGE_TAG }} \
            -t ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest \
            .
          docker push ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.IMAGE_TAG }}
          docker push ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest

      - name: Install Aliyun CLI
        run: |
          curl -fsSL --retry 3 https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz -o aliyun-cli.tgz
          file aliyun-cli.tgz | grep -q "gzip compressed data" || { echo "❌ 下载文件损坏"; exit 1; }
          tar xzf aliyun-cli.tgz
          sudo mv aliyun /usr/local/bin/
          echo "✅ Aliyun CLI $(aliyun version 2>/dev/null || echo installed)"

      - name: Configure Aliyun credentials
        run: |
          aliyun configure set \
            --access-key-id ${{ secrets.ALIYUN_ACCESS_KEY_ID }} \
            --access-key-secret ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }} \
            --region ${{ env.SAE_REGION }}

      - name: Deploy to SAE
        run: |
          IMAGE="${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.IMAGE_TAG }}"
          echo "Deploying image: $IMAGE to SAE app ${{ env.SAE_APP_ID }}"

          # 获取当前环境变量配置
          ENVS=$(aliyun sae GET /pop/v1/sam/app/describeApplicationConfig \
            --AppId ${{ env.SAE_APP_ID }} \
            --RegionId ${{ env.SAE_REGION }} | \
            python3 -c "import json,sys; d=json.load(sys.stdin).get('Data',{}); [print(f'{e[\"name\"]}={e[\"value\"]}') for e in d.get('Envs',[])]" | paste -sd ',' -)

          # 发布新版本
          aliyun sae POST /pop/v1/sam/app/deployApplication \
            --AppId ${{ env.SAE_APP_ID }} \
            --RegionId ${{ env.SAE_REGION }} \
            --ImageUrl "$IMAGE" \
            --UpdateStrategy "{\"type\":\"GrayBatchUpdate\",\"batchUpdate\":{\"batch\":1,\"releaseType\":\"auto\",\"batchWaitTime\":30}}" \
            --MinReadyInstances 1 \
            --MinReadySeconds 10 \
            --Envs "$ENVS"

          echo "Deploy initiated, waiting for readiness..."
          sleep 30

          # 等待部署完成
          for i in $(seq 1 12); do
            RESULT=$(aliyun sae GET /pop/v1/sam/app/describeApplicationStatus \
              --AppId ${{ env.SAE_APP_ID }} \
              --RegionId ${{ env.SAE_REGION }})
            STATUS=$(echo "$RESULT" | python3 -c "import json,sys; print(json.load(sys.stdin).get('Data',{}).get('Status','UNKNOWN'))")
            echo "Status: $STATUS (attempt $i)"
            if [ "$STATUS" = "RUNNING" ]; then
              echo "✅ Deployment succeeded"
              exit 0
            fi
            sleep 10
          done
          echo "⚠️ Deployment status check timed out, check SAE console"

      - name: Health check
        run: |
          # SAE 部署后通过内网 SLB 访问 health check
          # 如果配置了公网 SLB，可改为公网地址
          echo "部署完成，请通过域名或 SAE 控制台验证应用是否正常"
          echo "AppId: ${{ env.SAE_APP_ID }}"
