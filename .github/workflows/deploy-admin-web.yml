name: Build and Deploy admin-web

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/admin-web/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACR_REGISTRY: crpi-qdcgkzwx9p9zckga.cn-hangzhou.personal.cr.aliyuncs.com
  ACR_NAMESPACE: ai-customer-service
  IMAGE_NAME: admin-web
  SAE_APP_ID: 607b5233-9e24-4abe-9d75-a59b133b186f
  SAE_REGION: cn-hangzhou
  WORKING_DIR: frontend/admin-web

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    concurrency:
      group: deploy-admin-web
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=v$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Login to Alibaba Cloud ACR
        run: |
          docker login ${{ env.ACR_REGISTRY }} \
            --username ${{ secrets.ACR_USERNAME }} \
            --password ${{ secrets.ACR_PASSWORD }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci

      - name: TypeScript type check
        working-directory: ${{ env.WORKING_DIR }}
        run: npx tsc --noEmit

      - name: Run unit tests
        working-directory: ${{ env.WORKING_DIR }}
        run: npx vitest run

      - name: Build and push Docker image
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          # Push to ACR (for backup) + ghcr.io (for SAE deployment)
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          docker build \
            --build-arg NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL || 'https://api.migaozn.com' }} \
            --build-arg NEXT_PUBLIC_AI_API_BASE_URL=${{ secrets.NEXT_PUBLIC_AI_API_BASE_URL || 'https://ai-api.migaozn.com' }} \
            --build-arg NEXT_PUBLIC_COOKIE_DOMAIN=${{ secrets.NEXT_PUBLIC_COOKIE_DOMAIN || '.migaozn.com' }} \
            -t ghcr.io/zhaokai-mgzn/migao/admin-web:${{ steps.tag.outputs.IMAGE_TAG }} \
            -t ghcr.io/zhaokai-mgzn/migao/admin-web:latest \
            -t ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.IMAGE_TAG }} \
            -t ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest \
            .
          docker push ghcr.io/zhaokai-mgzn/migao/admin-web:${{ steps.tag.outputs.IMAGE_TAG }}
          docker push ghcr.io/zhaokai-mgzn/migao/admin-web:latest
          docker push ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.IMAGE_TAG }}
          docker push ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest

      - name: Install Aliyun CLI
        run: |
          curl -fsSL --retry 3 https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz -o aliyun-cli.tgz
          file aliyun-cli.tgz | grep -q "gzip compressed data" || { echo "❌ 下载文件损坏"; exit 1; }
          tar xzf aliyun-cli.tgz
          sudo mv aliyun /usr/local/bin/
          echo "✅ Aliyun CLI $(aliyun version 2>/dev/null || echo installed)"

      - name: Configure Aliyun credentials
        env:
          AK: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          SK: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
        run: |
          aliyun configure set --access-key-id "$AK" --access-key-secret "$SK" --region ${{ env.SAE_REGION }}

      - name: Deploy to SAE
        run: |
          IMAGE="${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.IMAGE_TAG }}"
          echo "Deploying image: $IMAGE to SAE app ${{ env.SAE_APP_ID }}"

          aliyun sae POST /pop/v1/sam/app/deployApplication \
            --AppId ${{ env.SAE_APP_ID }} \
            --RegionId ${{ env.SAE_REGION }} \
            --ImageUrl "$IMAGE" \
            --InternetSlbId lb-bp1vv0e4mzro1034ywuqq \
            --Internet true \
            --Port 3001 \
            --MinReadyInstances 1 \
            --Replicas 1 \
            --Envs '[{"name":"PORT","value":"3001"}]'

          echo "Deploy initiated, waiting for readiness..."
          sleep 30

          # 等待部署完成
          for i in $(seq 1 12); do
            STATUS=$(aliyun sae GET /pop/v1/sam/app/describeApplicationStatus \
              --AppId ${{ env.SAE_APP_ID }} \
              --RegionId ${{ env.SAE_REGION }} | \
              python3 -c "import json,sys; print(json.load(sys.stdin).get('Data',{}).get('SubStatus','UNKNOWN'))")
            echo "Status: $STATUS (attempt $i)"
            if [ "$STATUS" = "NORMAL" ]; then
              echo "✅ Deployment succeeded"
              exit 0
            fi
            sleep 10
          done
          echo "⚠️ Deployment status check timed out, check SAE console"

      - name: Health check
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -m 10 http://115.29.222.118:3001/login/)
          echo "SLB health check: HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "401" ]; then
            echo "✅ admin-web 应用正常运行"
          else
            echo "⚠️ 应用返回 HTTP $HTTP_CODE，请检查 SAE 控制台"
          fi

      - name: Refresh CDN cache
        continue-on-error: true
        run: |
          echo "刷新 CDN 缓存..."
          aliyun cdn RefreshObjectCaches --ObjectPath "https://merchant.migaozn.com/" --ObjectType Directory
          aliyun cdn RefreshObjectCaches --ObjectPath "https://migaozn.com/" --ObjectType Directory
          echo "✅ CDN 缓存刷新已提交"

      - name: Post-deploy smoke test
        run: |
          echo "部署后冒烟测试..."
          FAILS=0

          # 1. 登录页可达
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" -m 10 http://115.29.222.118:3001/login/)
          if [ "$HTTP" = "200" ] || [ "$HTTP" = "308" ]; then
            echo "  ✅ 登录页 HTTP $HTTP"
          else
            echo "  ❌ 登录页 HTTP $HTTP (expected 200/308)"
            FAILS=$((FAILS + 1))
          fi

          # 2. 动态路由可达（不依赖 OSS fallback）
          for route in /orders/ /products/ /customers/ /dashboard/ /after-sales/; do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" -m 10 "http://115.29.222.118:3001${route}")
            if [ "$HTTP" = "200" ] || [ "$HTTP" = "308" ]; then
              echo "  ✅ ${route} HTTP $HTTP"
            else
              echo "  ❌ ${route} HTTP $HTTP (expected 200/308)"
              FAILS=$((FAILS + 1))
            fi
          done

          # 3. 发货页（曾经 OSS NoSuchKey）
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" -m 10 http://115.29.222.118:3001/orders/test/ship/)
          if [ "$HTTP" = "200" ] || [ "$HTTP" = "308" ]; then
            echo "  ✅ 发货页 HTTP $HTTP"
          else
            echo "  ❌ 发货页 HTTP $HTTP (expected 200/308)"
            FAILS=$((FAILS + 1))
          fi

          if [ "$FAILS" -gt 0 ]; then
            echo "❌ $FAILS 项冒烟测试失败"
            exit 1
          fi

          # 8. API 契约验证 — 所有核心 API 字段类型
          echo "验证 API 契约..."
          API="https://api.migaozn.com"
          TOKEN=$(curl -s -X POST "$API/api/auth/sms/login" \
            -H 'Content-Type: application/json' \
            -d '{"phone":"13800138000","code":"123456"}' 2>/dev/null | \
            python3 -c "import json,sys; print(json.load(sys.stdin).get('data',{}).get('accessToken',''))" 2>/dev/null)

          if [ -z "$TOKEN" ]; then
            echo "  ⚠️ 无法获取 token，跳过 API 契约验证"
          else
            python3 -c "
import json, sys, urllib.request

API = '$API'
TOKEN = '$TOKEN'
fail = 0

def get(path):
    req = urllib.request.Request(f'{API}{path}')
    req.add_header('Authorization', f'Bearer {TOKEN}')
    try:
        with urllib.request.urlopen(req, timeout=10) as r:
            return json.loads(r.read())
    except Exception as e:
        print(f'  ❌ {path}: {e}')
        return None

def check(obj, path, expected_type):
    global fail
    keys = path.split('.')
    cur = obj
    for k in keys:
        if cur is None or (isinstance(cur, dict) and k not in cur):
            print(f'  ❌ {path}: 字段不存在')
            fail += 1
            return
        cur = cur[k] if isinstance(cur, dict) else None
    actual = type(cur).__name__
    if expected_type == 'number':
        ok = isinstance(cur, (int, float))
    elif expected_type == 'array':
        ok = isinstance(cur, list)
    elif expected_type == 'string_or_number':
        ok = isinstance(cur, (str, int, float))
    else:
        ok = isinstance(cur, str) if expected_type == 'string' else True
    marker = '✅' if ok else '❌'
    if not ok: fail += 1
    print(f'  {marker} {path}: {actual}')

# 1. 订单列表
print('订单列表:')
data = get('/api/admin/orders?page=1&size=1')
if data:
    items = data.get('data',{}).get('items',[])
    if items:
        o = items[0]
        check(o, 'id', 'string')
        check(o, 'orderNo', 'string')
        check(o, 'customerName', 'string')
        check(o, 'totalAmount', 'number')
        check(o, 'status', 'string')
        check(o, 'items', 'array')
    else:
        print('  ⚠️ 无数据，跳过')

# 2. 商品列表
print('商品列表:')
data = get('/api/admin/products?page=1&size=1')
if data:
    items = data.get('data',{}).get('items',[])
    if items:
        p = items[0]
        check(p, 'id', 'string')
        check(p, 'name', 'string')
        check(p, 'status', 'string')
        check(p, 'price', 'number')
    else:
        print('  ⚠️ 无数据，跳过')

# 3. 客户列表
print('客户列表:')
data = get('/api/admin/customers?page=1&size=1')
if data:
    items = data.get('data',{}).get('items',[])
    if items:
        c = items[0]
        check(c, 'id', 'string_or_number')
        has_id = c.get('phone') or c.get('name') or c.get('wechatNickname')
        if not has_id:
            print('  ❌ phone/name/wechatNickname 全为空')
            fail += 1
        else:
            print('  ✅ phone/name/wechatNickname: 至少一项存在')
    else:
        print('  ⚠️ 无数据，跳过')

# 4. 售后列表
print('售后列表:')
data = get('/api/admin/after-sales?page=1&size=1')
if data:
    items = data.get('data',{}).get('items',[])
    if items:
        a = items[0]
        check(a, 'id', 'string')
        check(a, 'ticketNo', 'string')
        check(a, 'status', 'string')
    else:
        print('  ⚠️ 无数据，跳过')

# 5. 金额字段 number 类型
print('金额类型:')
data = get('/api/admin/orders?page=1&size=3')
if data:
    for o in data.get('data',{}).get('items',[])[:3]:
        if o.get('totalAmount') is not None and not isinstance(o.get('totalAmount'), (int, float)):
            print(f'  ❌ totalAmount 不是 number: {type(o.get(\"totalAmount\")).__name__}')
            fail += 1
        for item in (o.get('items') or []):
            for f in ('unitPrice','amount','subtotal'):
                v = item.get(f)
                if v is not None and not isinstance(v, (int, float)):
                    print(f'  ❌ {f} 不是 number: {type(v).__name__}')
                    fail += 1
    print('  ✅ 金额字段类型正确')

if fail:
    print(f'❌ {fail} 项 API 契约验证失败')
    sys.exit(1)
else:
    print('✅ API 契约验证通过')
"
            if [ $? -ne 0 ]; then
              FAILS=$((FAILS + 1))
            fi
          fi

          if [ "$FAILS" -gt 0 ]; then
            echo "❌ $FAILS 项冒烟测试失败"
            exit 1
          fi
          echo "✅ 全部冒烟测试通过"
