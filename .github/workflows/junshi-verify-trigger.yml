name: junshi/verify-trigger

# 机械操作：PR merge → 找关联 issue → 贴 VERIFY_TRIGGER + ai-verify/pending + reopen

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  trigger:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 贴 VERIFY_TRIGGER + 打标签
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          set -euo pipefail
          ISSUE_NUM=$(echo "$PR_BODY" | grep -oP '(Fixes|Closes|Resolves)\s+#\K\d+' | head -1 || echo "")
          if [ -z "$ISSUE_NUM" ]; then echo "No linked issue, skip"; exit 0; fi

          # 贴 VERIFY_TRIGGER
          cat > /tmp/verify.md << COMMENT
          ## 🤖 军师验收触发

          PR [#$PR_NUMBER]($PR_URL) 已合入 \`main\`。

          | 项目 | 值 |
          |------|-----|
          | Issue | #$ISSUE_NUM |
          | Commit | \`$PR_SHA\` |
          | Author | @$PR_AUTHOR |

          ---

          <!-- VERIFY_TRIGGER
          {
            "issue_id": $ISSUE_NUM,
            "pr_number": $PR_NUMBER,
            "commit": "$PR_SHA",
            "pr_author": "$PR_AUTHOR",
            "merged_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          -->
          COMMENT
          gh issue comment "$ISSUE_NUM" --body-file /tmp/verify.md

          # 标签 + reopen
          gh issue edit "$ISSUE_NUM" --add-label "ai-verify/pending" 2>/dev/null || true
          if [ "$(gh issue view "$ISSUE_NUM" --json state --jq '.state')" = "CLOSED" ]; then
            gh issue reopen "$ISSUE_NUM" 2>/dev/null || true
          fi
          echo "✅ VERIFY_TRIGGER posted + ai-verify/pending"
