name: E2E Real (AI Agent 能力测试)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e-real:
    name: E2E Real (AI Agent 能力测试)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/ai-agent-service/requirements.txt

      - name: Install dependencies
        working-directory: backend/ai-agent-service
        run: pip install -r requirements.txt -q

      - name: Run real E2E tests (pytest — 零 Mock，真实 LLM 调用)
        working-directory: backend/ai-agent-service
        env:
          CI: 'true'
          E2E_REAL_ENABLED: 'true'
          ADMIN_API_BASE_URL: ${{ secrets.E2E_ADMIN_API_URL || 'https://api.migaozn.com' }}
          AI_AGENT_URL: ${{ secrets.AI_AGENT_SERVICE_URL }}
          SERVICE_TOKEN: ${{ secrets.SMOKE_SERVICE_TOKEN }}
        run: |
          python -m pytest tests/e2e/real/ -v --tb=long -q \
            --timeout=120 \
            --no-cov \
            --maxfail=10

      - name: Upload test artifacts (failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-real-artifacts
          path: |
            backend/ai-agent-service/.pytest_cache/
            backend/ai-agent-service/tests/e2e/real/__pycache__/

      - name: Create Issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[E2E Real] AI Agent 能力测试失败 — ${new Date().toISOString().slice(0, 10)}`,
              body: `E2E Real 测试失败（零 Mock，真实 LLM 调用）。\n\n查看详情：${runUrl}`,
              labels: ['bug', 'role/qa'],
            })
