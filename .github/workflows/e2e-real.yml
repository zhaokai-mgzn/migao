name: E2E Real (AI Agent 能力测试)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: '20'
  PLAYWRIGHT_BROWSERS_PATH: '0'

jobs:
  e2e-real:
    name: E2E Real (AI Agent 能力测试)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: tests
        run: npx playwright install chromium --with-deps

      - name: Validate secrets
        run: |
          if [ -z "$PHONE" ] || [ -z "$CODE" ]; then
            echo "❌ E2E_ADMIN_PHONE 和 E2E_SMS_CODE 必须配置"
            exit 1
          fi
          echo "✅ Secrets configured"
        env:
          PHONE: ${{ secrets.E2E_ADMIN_PHONE }}
          CODE: ${{ secrets.E2E_SMS_CODE }}

      - name: Run E2E tests (real only — AI Agent 能力验证)
        working-directory: tests
        env:
          BASE_URL: ${{ secrets.E2E_BASE_URL || 'https://admin.migaozn.com' }}
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.E2E_BASE_URL || 'https://admin.migaozn.com' }}
          E2E_ADMIN_PHONE: ${{ secrets.E2E_ADMIN_PHONE || '13800138000' }}
          E2E_SMS_CODE: ${{ secrets.E2E_SMS_CODE || '123456' }}
          CI: 'true'
        run: |
          npx playwright test --project=real \
            --reporter=list \
            --retries=2 \
            --max-failures=10

      - name: Upload test artifacts (failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-real-artifacts
          path: |
            tests/playwright-report/
            tests/test-results/

      - name: Create Issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[E2E Real] AI Agent 能力测试失败 — ${new Date().toISOString().slice(0, 10)}`,
              body: `E2E Real 测试失败（AI Agent 能力验证，含 LLM 调用）。\n\n查看详情：${runUrl}`,
              labels: ['bug', 'role/qa'],
            })
