name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/admin-web/**'
  workflow_dispatch:

env:
  ACR_REGISTRY: crpi-qdcgkzwx9p9zckga.cn-hangzhou.personal.cr.aliyuncs.com
  ACR_NAMESPACE: ai-customer-service
  IMAGE_NAME: admin-web
  SAE_APP_ID: 607b5233-9e24-4abe-9d75-a59b133b186f
  SAE_REGION: cn-hangzhou

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set tag
        id: tag
        run: echo "tag=v$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Docker login ACR
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ env.ACR_REGISTRY }} -u ${{ secrets.ACR_USERNAME }} --password-stdin

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/admin-web/package-lock.json

      - name: npm ci
        working-directory: frontend/admin-web
        run: npm ci

      - name: Type check
        working-directory: frontend/admin-web
        run: npx tsc --noEmit

      - name: Unit tests
        working-directory: frontend/admin-web
        run: npx vitest run

      - name: Build and push
        working-directory: frontend/admin-web
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          IMG=${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker build \
            --build-arg NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL || 'https://api.migaozn.com' }} \
            --build-arg NEXT_PUBLIC_AI_API_BASE_URL=${{ secrets.NEXT_PUBLIC_AI_API_BASE_URL || 'https://ai-api.migaozn.com' }} \
            --build-arg NEXT_PUBLIC_COOKIE_DOMAIN=${{ secrets.NEXT_PUBLIC_COOKIE_DOMAIN || '.migaozn.com' }} \
            -t ghcr.io/zhaokai-mgzn/migao/admin-web:$TAG \
            -t ghcr.io/zhaokai-mgzn/migao/admin-web:latest \
            -t $IMG:$TAG \
            -t $IMG:latest \
            .
          docker push ghcr.io/zhaokai-mgzn/migao/admin-web:$TAG
          docker push ghcr.io/zhaokai-mgzn/migao/admin-web:latest
          docker push $IMG:$TAG
          docker push $IMG:latest

      - name: Deploy SAE
        env:
          AK: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          SK: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
        run: |
          curl -fsSL https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz -o /tmp/aliyun.tgz
          tar xzf /tmp/aliyun.tgz -C /tmp
          sudo mv /tmp/aliyun /usr/local/bin/
          aliyun configure set --access-key-id "$AK" --access-key-secret "$SK" --region ${{ env.SAE_REGION }}
          IMG="${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}"
          aliyun sae POST /pop/v1/sam/app/deployApplication \
            --AppId ${{ env.SAE_APP_ID }} \
            --RegionId ${{ env.SAE_REGION }} \
            --ImageUrl "$IMG" \
            --InternetSlbId lb-bp1vv0e4mzro1034ywuqq \
            --Internet true \
            --Port 3001 \
            --MinReadyInstances 1 \
            --Replicas 1 \
            --Envs '[{"name":"PORT","value":"3001"}]'
            --Envs '[{"name":"PORT","value":"3001"}]'

      - name: Verify
        run: |
          sleep 30
          curl -sf -m 10 http://115.29.222.118:3001/login/ -o /dev/null && echo "OK" || echo "WARN"

      - name: CDN refresh
        env:
          AK: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          SK: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
        run: |
          curl -fsSL https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz -o /tmp/aliyun.tgz
          tar xzf /tmp/aliyun.tgz -C /tmp
          sudo mv /tmp/aliyun /usr/local/bin/
          aliyun configure set --access-key-id "$AK" --access-key-secret "$SK" --region ${{ env.SAE_REGION }}
          aliyun cdn RefreshObjectCaches --ObjectPath "https://merchant.migaozn.com/" --ObjectType Directory
          aliyun cdn RefreshObjectCaches --ObjectPath "https://migaozn.com/" --ObjectType Directory
