name: Issue CONTRACT_JSON Check

on:
  issues:
    types: [opened]

jobs:
  check-contract:
    name: Check CONTRACT_JSON
    runs-on: ubuntu-latest
    timeout-minutes: 2
    # 仅在 issue 事件下运行，防止 push 事件误触发时 github.event.issue 未定义导致 crash
    if: |
      github.event_name == 'issues' &&
      !contains(github.event.issue.title, '[E2E Web]') &&
      !contains(github.event.issue.title, '[coverage]') &&
      !contains(github.event.issue.title, '[coverage-tracking]') &&
      !startsWith(github.event.issue.title, 'PR Check') &&
      github.event.issue.user.type != 'Bot' &&
      !contains(github.event.issue.labels.*.name, 'pairing') &&
      !contains(github.event.issue.labels.*.name, 'ai-draft') &&
      !contains(github.event.issue.labels.*.name, 'human-drive')

    steps:
      - name: Check and remind
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';

            const hasContract = /<!--\s*CONTRACT_JSON/.test(body);
            const hasTruths = /"business_truths"\s*:\s*\[[^\]]*[a-zA-Z一-鿿]/.test(body) ||
              /##\s*业务真值/.test(body) ||
              /##\s*验收标准\s*\n\s*[-*]\s*\S/.test(body) ||
              /##\s*问题描述/.test(body) ||
              /condition.*→.*expected/.test(body);

            if (hasContract || hasTruths) {
              // 有业务真值 → 自动加入二郎神体系
              const needsLabel = !context.payload.issue.labels.some(l => l.name === 'needs-verification');
              if (needsLabel) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  labels: ['needs-verification'],
                });
                console.log('✅ 已添加 needs-verification → 进入二郎神体系');
              } else {
                console.log('✅ 已有 needs-verification');
              }
              return;
            }

            const msg = `## ⚠️ 缺少业务真值

本 issue 缺少 \`CONTRACT_JSON\` 或业务真值描述。

### 为什么需要
二郎神验收体系依赖**业务真值**来生成测试 case（DRAFT_JSON）。
缺少真值 → 军师无法反推 case → 验收 agent 无法验证 → 质量无法兜底。

### 请补充
在 issue body 末尾添加：

\`\`\`html
<!-- CONTRACT_JSON
{
  "business_truths": [
    "条件A → 结果B",
    "用户执行X → 系统返回Y",
    "API POST /xxx 返回 201 且 data.id 非空"
  ]
}
-->
\`\`\`

或至少用自然语言描述：

\`\`\`markdown
## 验收标准
- API POST /xxx 返回 200 且 data.id 非空
- 不同租户数据互不可见
- 无效输入返回明确错误
\`\`\`

> 🤖 真值齐全后军师会自动反推 case 草稿，研发 review 后即可开工。

Co-Authored-By: Claude <noreply@anthropic.com>`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: msg,
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['needs-truths'],
            });
            console.log('✅ 已提醒补充 CONTRACT_JSON');
