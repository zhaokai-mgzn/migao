name: Issue CONTRACT_JSON Check

on:
  issues:
    types: [opened]

jobs:
  check-contract:
    name: Check CONTRACT_JSON
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Guard and remind
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName !== 'issues') {
              console.log('Skipped: not an issue event');
              return;
            }
            const issue = context.payload.issue;
            if (!issue) {
              console.log('Skipped: no issue payload');
              return;
            }

            const title = issue.title || '';
            if (title.startsWith('[E2E Web]') || title.startsWith('[coverage]') || title.startsWith('PR Check')) {
              console.log('Skipped: system-generated issue');
              return;
            }

            if (issue.user && issue.user.type === 'Bot') {
              console.log('Skipped: Bot created');
              return;
            }

            if (issue.labels && issue.labels.some(l => l.name === 'ai-draft')) {
              console.log('Skipped: ai-draft label');
              return;
            }

            const body = issue.body || '';

            const hasContract = /<!--\s*CONTRACT_JSON/.test(body);
            const hasTruths = /"business_truths"\s*:\s*\[[^\]]*[a-zA-Z一-鿿]/.test(body) ||
              /##\s*业务真值/.test(body) ||
              /##\s*验收标准\s*\n\s*[-*]\s*\S/.test(body) ||
              /##\s*问题描述/.test(body) ||
              /condition.*→.*expected/.test(body);

            if (hasContract || hasTruths) {
              const needsLabel = !context.payload.issue.labels.some(l => l.name === 'needs-verification');
              if (needsLabel) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  labels: ['needs-verification'],
                });
                console.log('Added needs-verification');
              }
              return;
            }

            const msg = `## ⚠️ 缺少业务真值

本 issue 缺少 CONTRACT_JSON 或业务真值描述。请在 issue body 末尾补充验收标准。

Co-Authored-By: Claude <noreply@anthropic.com>`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: msg,
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['needs-truths'],
            });
            console.log('Reminded for CONTRACT_JSON');
