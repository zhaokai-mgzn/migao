name: PR Check

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============ 安全门禁：拦截 .env 文件 ============
  block-env-files:
    name: Block .env files (except .env.example)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for forbidden .env files
        run: |
          FORBIDDEN=$(git diff --name-only origin/main...HEAD | grep -E '\.env$|\.env\.' | grep -v '\.env\.example' || true)
          if [ -n "$FORBIDDEN" ]; then
            echo "❌ PR contains forbidden .env files:"
            echo "$FORBIDDEN"
            echo "Use .env.example template instead. Real values go to deployment platform env vars."
            exit 1
          fi
          echo "✅ No forbidden .env files"

  # ============ admin-api 单测全量 ============
  admin-api-test:
    name: admin-api unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run unit tests
        working-directory: backend/admin-api
        run: ./mvnw test -q

  # ============ ai-agent-service 单测全量 ============
  ai-agent-test:
    name: ai-agent-service unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/ai-agent-service/requirements.txt

      - name: Install dependencies
        working-directory: backend/ai-agent-service
        run: pip install -r requirements.txt

      - name: Run unit tests
        working-directory: backend/ai-agent-service
        env:
          PRIMARY_API_KEY: ci-dummy
          PRIMARY_BASE_URL: https://api.deepseek.com/v1
          PRIMARY_MODEL: deepseek-v4-pro
          DASHVECTOR_API_KEY: ci-dummy
          DASHVECTOR_ENDPOINT: https://ci-dummy.example.com
          DASHVECTOR_COLLECTION: ci
          ADMIN_API_BASE_URL: http://localhost:8080
          SERVICE_TOKEN: ci-dummy
          JWT_PUBLIC_KEY: ci-dummy
          LOGISTICS_API_URL: https://ci-dummy.example.com
          LOGISTICS_APPCODE: ci-dummy
          SSE_TIMEOUT: '300'
          SSE_PING_INTERVAL: '30'
          CORS_ALLOWED_ORIGINS: http://localhost:3000
        run: |
          python -m pytest tests/ -v --tb=short -q \
            --ignore=tests/test_post_deploy_verify.py \
            --ignore=tests/manual_test_pe_flow.py \
            -m "not integration"

      - name: Run junshi + dual_verify tests
        working-directory: backend/ai-agent-service
        run: |
          python -m pytest ../../tests/unit_dual_verify/ ../../tests/unit_junshi/ -v --tb=short -q 

  # ============ admin-web 类型检查 + 单测 ============
  admin-web-test:
    name: admin-web typecheck + unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/admin-web/package-lock.json

      - name: Install dependencies
        working-directory: frontend/admin-web
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend/admin-web
        run: npx tsc --noEmit

      - name: Run unit tests
        working-directory: frontend/admin-web
        run: npx vitest run

  # ============ mini-app 类型检查 + 单测 ============
  mini-app-test:
    name: mini-app typecheck + unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/mini-app/package-lock.json

      - name: Install dependencies
        working-directory: frontend/mini-app
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend/mini-app
        run: npx tsc --noEmit

      - name: Run unit tests
        working-directory: frontend/mini-app
        run: npx jest --passWithNoTests

  # ============ QA Growth Gate — 事前测试覆盖门禁（block 模式）============
  qa-growth-gate:
    name: QA Growth Gate
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check test coverage in diff
        id: check
        run: |
          # 获取 PR 变更文件列表
          git fetch origin main --depth=1
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD)

          BLOCKERS=0
          WARNINGS=0
          MISSING_BLOCK=""
          MISSING_WARN=""

          # ---- 加载豁免配置 ----
          EXEMPTIONS_FILE=".github/qa-exemptions.yml"
          EXEMPT_PATTERNS=""
          if [ -f "$EXEMPTIONS_FILE" ]; then
            # 从 YAML 中提取 pattern 行（简单解析：匹配 "pattern:" 后的值）
            RAW_PATTERNS=$(grep -E '^\s*- pattern:' "$EXEMPTIONS_FILE" | sed 's/.*pattern:\s*"\(.*\)".*/\1/' || echo "")
            # 安全校验：拒绝含 shell 元字符的 pattern（防御深度，文件本身走 PR review）
            for raw in $RAW_PATTERNS; do
              case "$raw" in
                *'$'*|*'`'*|*';'*|*'('*|*')'*|*'|'*|*'&'*|*'<'*|*'>'*)
                  echo "::warning::跳过不安全的豁免 pattern: $raw" ;;
                *) EXEMPT_PATTERNS="$EXEMPT_PATTERNS $raw" ;;
              esac
            done
            EXEMPT_PATTERNS="${EXEMPT_PATTERNS# }"
          fi

          echo "## 🔍 QA Growth Gate 扫描结果" > $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 文件 | 模块 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|------|" >> $GITHUB_STEP_SUMMARY

          for file in $CHANGED_FILES; do
            # ---- 豁免检查 ----
            IS_EXEMPT=false
            if [ -n "$EXEMPT_PATTERNS" ]; then
              for pat in $EXEMPT_PATTERNS; do
                # 简单 glob 匹配：用 case
                case "$file" in
                  $pat) IS_EXEMPT=true; break ;;
                esac
              done
            fi
            if [ "$IS_EXEMPT" = true ]; then
              echo "| $file | — | 🔓 豁免 |" >> $GITHUB_STEP_SUMMARY
              continue
            fi

            case "$file" in
              # ===== Python ai-agent-service (blocking) =====
              backend/ai-agent-service/app/tools/*.py)
                tool_name=$(basename "$file" .py)
                if echo "$CHANGED_FILES" | grep -qE "tests/test_tools_|tests/test_${tool_name}|tests/e2e/real/"; then
                  echo "| $file | Tool (L2+L3) | ✅ |" >> $GITHUB_STEP_SUMMARY
                else
                  echo "| $file | Tool (L2+L3) | ❌ BLOCKED |" >> $GITHUB_STEP_SUMMARY
                  MISSING_BLOCK="$MISSING_BLOCK\n- **$file**: Tool 变更必须补 L2 单测 + L3 Real E2E（禁止只补单测）"
                  BLOCKERS=$((BLOCKERS + 1))
                fi
                ;;
              backend/ai-agent-service/app/graph/*.py)
                if echo "$CHANGED_FILES" | grep -qE "tests/test_graph_|tests/test_skill_"; then
                  echo "| $file | Graph/Skill (L2) | ✅ |" >> $GITHUB_STEP_SUMMARY
                else
                  echo "| $file | Graph/Skill (L2) | ❌ BLOCKED |" >> $GITHUB_STEP_SUMMARY
                  MISSING_BLOCK="$MISSING_BLOCK\n- **$file**: Graph/Skill 变更必须补 L2 单测（skill 路由覆盖 + 图结构验证）"
                  BLOCKERS=$((BLOCKERS + 1))
                fi
                ;;
              backend/ai-agent-service/app/agents/*.py)
                if echo "$CHANGED_FILES" | grep -qE "tests/test_agent_|tests/test_intent_"; then
                  echo "| $file | Agent (L2) | ✅ |" >> $GITHUB_STEP_SUMMARY
                else
                  echo "| $file | Agent (L2) | ❌ BLOCKED |" >> $GITHUB_STEP_SUMMARY
                  MISSING_BLOCK="$MISSING_BLOCK\n- **$file**: Agent 配置变更必须补 L2 单测（意图路由 + 配置验证）"
                  BLOCKERS=$((BLOCKERS + 1))
                fi
                ;;

              # ===== Java admin-api (blocking) =====
              backend/admin-api/src/main/java/com/migao/admin/controller/*.java)
                ctrl_name=$(basename "$file" .java | sed 's/Controller//')
                if echo "$CHANGED_FILES" | grep -qE "${ctrl_name}Test|${ctrl_name}ControllerTest"; then
                  echo "| $file | Controller (L3) | ✅ |" >> $GITHUB_STEP_SUMMARY
                else
                  echo "| $file | Controller (L3) | ❌ BLOCKED |" >> $GITHUB_STEP_SUMMARY
                  MISSING_BLOCK="$MISSING_BLOCK\n- **$file**: Controller 变更必须补 MockMvc 集成测试 + API contract E2E"
                  BLOCKERS=$((BLOCKERS + 1))
                fi
                ;;
              backend/admin-api/src/main/java/com/migao/admin/service/*.java)
                svc_name=$(basename "$file" .java | sed 's/Service//')
                if echo "$CHANGED_FILES" | grep -qE "${svc_name}Test|${svc_name}ServiceTest"; then
                  echo "| $file | Service (L2) | ✅ |" >> $GITHUB_STEP_SUMMARY
                else
                  echo "| $file | Service (L2) | ❌ BLOCKED |" >> $GITHUB_STEP_SUMMARY
                  MISSING_BLOCK="$MISSING_BLOCK\n- **$file**: Service 变更必须补 JUnit 单测（覆盖率 ≥80%）"
                  BLOCKERS=$((BLOCKERS + 1))
                fi
                ;;
              backend/admin-api/src/main/java/com/migao/admin/mapper/*.java)
                mapper_name=$(basename "$file" .java | sed 's/Mapper//')
                if echo "$CHANGED_FILES" | grep -qE "${mapper_name}Test|${mapper_name}MapperTest"; then
                  echo "| $file | Mapper (L2) | ✅ |" >> $GITHUB_STEP_SUMMARY
                else
                  echo "| $file | Mapper (L2) | ❌ BLOCKED |" >> $GITHUB_STEP_SUMMARY
                  MISSING_BLOCK="$MISSING_BLOCK\n- **$file**: Mapper 变更必须补 JUnit SQL 验证测试"
                  BLOCKERS=$((BLOCKERS + 1))
                fi
                ;;
              backend/admin-api/src/main/java/com/migao/admin/security/*.java)
                if echo "$CHANGED_FILES" | grep -qE "SecurityConfigTest|JwtTokenProviderTest"; then
                  echo "| $file | Security (L2) | ✅ |" >> $GITHUB_STEP_SUMMARY
                else
                  echo "| $file | Security (L2) | ❌ BLOCKED |" >> $GITHUB_STEP_SUMMARY
                  MISSING_BLOCK="$MISSING_BLOCK\n- **$file**: 安全组件变更必须补安全测试（JWT 验证 + 认证流程）"
                  BLOCKERS=$((BLOCKERS + 1))
                fi
                ;;

              # ===== Java admin-api (warn only) =====
              backend/admin-api/src/main/java/com/migao/admin/entity/*.java|backend/admin-api/src/main/java/com/migao/admin/dto/*.java)
                echo "| $file | Entity/DTO | ⚠️ 需 API contract 验证 |" >> $GITHUB_STEP_SUMMARY
                MISSING_WARN="$MISSING_WARN\n- **$file**: Entity/DTO 序列化字段需在 API contract E2E 验证"
                WARNINGS=$((WARNINGS + 1))
                ;;

              # ===== Frontend admin-web (blocking) =====
              frontend/admin-web/src/components/*.tsx|frontend/admin-web/src/components/**/*.tsx)
                comp_name=$(basename "$file" .tsx)
                if echo "$CHANGED_FILES" | grep -qE "tests/unit/components/${comp_name}|tests/unit/.*${comp_name}"; then
                  echo "| $file | Component (L4) | ✅ |" >> $GITHUB_STEP_SUMMARY
                else
                  echo "| $file | Component (L4) | ❌ BLOCKED |" >> $GITHUB_STEP_SUMMARY
                  MISSING_BLOCK="$MISSING_BLOCK\n- **$file**: 交互组件变更必须补 L4 E2E（点击链路：渲染→点击→发送→验证）"
                  BLOCKERS=$((BLOCKERS + 1))
                fi
                ;;
              frontend/admin-web/src/app/*)
                if echo "$CHANGED_FILES" | grep -qE "tests/e2e/specs/"; then
                  echo "| $file | Page (L4) | ✅ |" >> $GITHUB_STEP_SUMMARY
                else
                  echo "| $file | Page (L4) | ❌ BLOCKED |" >> $GITHUB_STEP_SUMMARY
                  MISSING_BLOCK="$MISSING_BLOCK\n- **$file**: 新增/修改页面必须在 tests/e2e/specs/ 补 E2E spec 且在 anti-placeholder PAGES 数组注册"
                  BLOCKERS=$((BLOCKERS + 1))
                fi
                ;;
              frontend/admin-web/src/lib/*.ts|frontend/admin-web/src/store/*.ts)
                if echo "$CHANGED_FILES" | grep -qE "tests/unit/lib/|tests/unit/store/"; then
                  echo "| $file | Lib/Store (L2) | ✅ |" >> $GITHUB_STEP_SUMMARY
                else
                  echo "| $file | Lib/Store (L2) | ❌ BLOCKED |" >> $GITHUB_STEP_SUMMARY
                  MISSING_BLOCK="$MISSING_BLOCK\n- **$file**: 工具函数/状态管理变更必须补 L2 单元测试"
                  BLOCKERS=$((BLOCKERS + 1))
                fi
                ;;

              # ===== Infra / Config (info only) =====
              deploy/terraform/*.tf|.github/workflows/*.yml)
                echo "| $file | Infra/CI | ℹ️ 需确认 smoke test 覆盖 |" >> $GITHUB_STEP_SUMMARY
                ;;

              # ===== 测试文件 / 文档 / 配置 (auto-pass) =====
              */test*|*/tests/*|*.md|.gitignore|.env.example|*.xml|*.json|*.lock|*.sql|docs/*|*.png|*.jpg|*.svg)
                echo "| $file | Test/Doc/Config | ✅ 自动通过 |" >> $GITHUB_STEP_SUMMARY
                ;;

              # ===== 未匹配的文件 — 默认 info =====
              *)
                echo "| $file | — | ℹ️ 未识别，跳过 |" >> $GITHUB_STEP_SUMMARY
                ;;
            esac
          done

          echo "" >> $GITHUB_STEP_SUMMARY

          # 输出汇总
          if [ $BLOCKERS -gt 0 ]; then
            echo "## ❌ 发现 $BLOCKERS 处阻塞项" >> $GITHUB_STEP_SUMMARY
            echo -e "$MISSING_BLOCK" >> $GITHUB_STEP_SUMMARY
          fi
          if [ $WARNINGS -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## ⚠️ 发现 $WARNINGS 处警告（非阻塞）" >> $GITHUB_STEP_SUMMARY
            echo -e "$MISSING_WARN" >> $GITHUB_STEP_SUMMARY
          fi
          if [ $BLOCKERS -eq 0 ] && [ $WARNINGS -eq 0 ]; then
            echo "## ✅ 全部通过 — 所有代码变更均有对应测试覆盖" >> $GITHUB_STEP_SUMMARY
          fi

          echo "BLOCKERS=$BLOCKERS" >> $GITHUB_OUTPUT
          echo "WARNINGS=$WARNINGS" >> $GITHUB_OUTPUT

      # 阻塞检查：有 blocking 项时 fail job
      - name: Fail on blocking violations
        if: steps.check.outputs.BLOCKERS != '0'
        run: |
          echo "❌ QA Growth Gate 发现 ${{ steps.check.outputs.BLOCKERS }} 处缺测，阻塞合并。"
          echo "请补充对应测试，或在 .github/qa-exemptions.yml 中添加合法豁免项。"
          echo "详见 docs/testing/qa-growth-gate.md"
          exit 1

      # PR comment — 始终发布/更新（pass/fail/warn 都更新）
      - name: Post PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const blockers = '${{ steps.check.outputs.BLOCKERS }}';
            const warnings = '${{ steps.check.outputs.WARNINGS }}';

            // 读取 step summary 并转为 PR comment 格式
            let summary = '';
            try {
              summary = fs.readFileSync(process.env.GITHUB_STEP_SUMMARY, 'utf8');
            } catch (e) {
              summary = 'QA Growth Gate 运行异常，无法读取扫描结果。';
            }

            // PR comment 里标题降级（### 而非 ##，避免破坏页面结构）
            const tableContent = summary
              .replace(/^## /gm, '### ')
              .replace(/^# /gm, '## ');

            const b = parseInt(blockers) || 0;
            const w = parseInt(warnings) || 0;

            let icon, verdict, detail;
            if (b > 0) {
              icon = '❌';
              verdict = 'BLOCKED';
              detail = '> ❌ **合并被阻塞**。请补充缺失的测试，或在 `.github/qa-exemptions.yml` 中添加合法豁免项后重新请求 Review。\n> 详见 [docs/testing/qa-growth-gate.md](docs/testing/qa-growth-gate.md)';
            } else if (w > 0) {
              icon = '⚠️';
              verdict = 'WARNINGS';
              detail = '> ⚠️ 有警告但不阻塞合并。请尽快补充测试。';
            } else {
              icon = '✅';
              verdict = 'PASSED';
              detail = '> ✅ 所有检查通过！';
            }

            const body = `## ${icon} QA Growth Gate — ${verdict}

            ${tableContent}

            ---
            **Blockers**: ${b} | **Warnings**: ${w}
            ${detail}
            `;

            // 查找已有 QA Gate 评论 → 更新；否则创建
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const prevComment = comments.find(c => c.body.includes('QA Growth Gate'));
            if (prevComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: prevComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
