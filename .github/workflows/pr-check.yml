name: PR Check

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============ е®үе…Ёй—ЁзҰҒпјҡжӢҰжҲӘ .env ж–Үд»¶ ============
  block-env-files:
    name: Block .env files (except .env.example)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for forbidden .env files
        run: |
          FORBIDDEN=$(git diff --name-only origin/main...HEAD | grep -E '\.env$|\.env\.' | grep -v '\.env\.example' || true)
          if [ -n "$FORBIDDEN" ]; then
            echo "вқҢ PR contains forbidden .env files:"
            echo "$FORBIDDEN"
            echo "Use .env.example template instead. Real values go to deployment platform env vars."
            exit 1
          fi
          echo "вң… No forbidden .env files"

  # ============ admin-api еҚ•жөӢе…ЁйҮҸ ============
  admin-api-test:
    name: admin-api unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run unit tests
        working-directory: backend/admin-api
        run: ./mvnw test -q



  # ============ admin-web зұ»еһӢжЈҖжҹҘ + еҚ•жөӢ ============
  admin-web-test:
    name: admin-web typecheck + unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/admin-web/package-lock.json

      - name: Install dependencies
        working-directory: frontend/admin-web
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend/admin-web
        run: npx tsc --noEmit

      - name: Run unit tests
        working-directory: frontend/admin-web
        run: npx vitest run

      - name: Security audit (deps)
        working-directory: frontend/admin-web
        run: npm audit --production --audit-level=high
        continue-on-error: true

  # ============ E2E иҙЁйҮҸй—ЁзҰҒ вҖ” fixture жЁЎејҸпјҢдёҚдҫқиө–еҗҺз«Ҝ ============
  # еҸӘи·‘зәҜж•°жҚ®йӘҢиҜҒпјҡAPI еҘ‘зәҰгҖҒеҸҚеҚ дҪҚз¬ҰгҖҒи·ЁйЎөдёҖиҮҙжҖ§гҖӮ
  # дёҡеҠЎжөҒзЁӢжөӢиҜ•е’Ңзңҹе®һеҗҺз«ҜйӘҢиҜҒз”ұ post-deploy smoke иҙҹиҙЈгҖӮ
  e2e-quality-gate:
    name: E2E quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install test deps
        working-directory: tests
        run: npm ci

      - name: Install admin-web deps (for Playwright webServer)
        working-directory: frontend/admin-web
        run: npm ci

      - name: Run quality specs (fixture-only)
        working-directory: tests
        run: |
          npx playwright test --reporter=list --retries=1 \
            e2e/specs/quality/api-contract.spec.ts \
            e2e/specs/quality/anti-placeholder.spec.ts \
            e2e/specs/quality/cross-page-consistency.spec.ts

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::ж•°жҚ®иҙЁйҮҸй—ЁзҰҒеӨұиҙҘ"
          echo "::error::API еҘ‘зәҰеҸҳжӣҙ? cd tests && npx tsx e2e/scripts/record-fixtures.ts"

  # ============ QA Growth Gate вҖ” дәӢеүҚжөӢиҜ•иҰҶзӣ–й—ЁзҰҒпјҲblock жЁЎејҸпјү============
  qa-growth-gate:
    name: QA Growth Gate
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check test coverage in diff
        id: check
        run: |
          # иҺ·еҸ– PR еҸҳжӣҙж–Үд»¶еҲ—иЎЁ
          git fetch origin main
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD)

          BLOCKERS=0
          WARNINGS=0
          MISSING_BLOCK=""
          MISSING_WARN=""

          # ---- еҠ иҪҪиұҒе…Қй…ҚзҪ® ----
          EXEMPTIONS_FILE=".github/qa-exemptions.yml"
          EXEMPT_PATTERNS=""
          if [ -f "$EXEMPTIONS_FILE" ]; then
            # д»Һ YAML дёӯжҸҗеҸ– pattern иЎҢпјҲз®ҖеҚ•и§ЈжһҗпјҡеҢ№й…Қ "pattern:" еҗҺзҡ„еҖјпјү
            RAW_PATTERNS=$(grep -E '^\s*- pattern:' "$EXEMPTIONS_FILE" | sed 's/.*pattern:\s*"\(.*\)".*/\1/' || echo "")
            # е®үе…Ёж ЎйӘҢпјҡжӢ’з»қеҗ« shell е…ғеӯ—з¬Ұзҡ„ patternпјҲйҳІеҫЎж·ұеәҰпјҢж–Үд»¶жң¬иә«иө° PR reviewпјү
            for raw in $RAW_PATTERNS; do
              case "$raw" in
                *'$'*|*'`'*|*';'*|*'|'*|*'&'*|*'<'*|*'>'*)
                  echo "::warning::и·іиҝҮдёҚе®үе…Ёзҡ„иұҒе…Қ pattern: $raw" ;;
                *) EXEMPT_PATTERNS="$EXEMPT_PATTERNS $raw" ;;
              esac
            done
            EXEMPT_PATTERNS="${EXEMPT_PATTERNS# }"
          fi

          echo "## рҹ”Қ QA Growth Gate жү«жҸҸз»“жһң" > $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| ж–Үд»¶ | жЁЎеқ— | зҠ¶жҖҒ |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|------|" >> $GITHUB_STEP_SUMMARY

          for file in $CHANGED_FILES; do
            # ---- иұҒе…ҚжЈҖжҹҘ ----
            IS_EXEMPT=false
            if [ -n "$EXEMPT_PATTERNS" ]; then
              for pat in $EXEMPT_PATTERNS; do
                # з®ҖеҚ• glob еҢ№й…Қпјҡз”Ё case
                case "$file" in
                  $pat) IS_EXEMPT=true; break ;;
                esac
              done
            fi
            if [ "$IS_EXEMPT" = true ]; then
              echo "| $file | вҖ” | рҹ”“ иұҒе…Қ |" >> $GITHUB_STEP_SUMMARY
              continue
            fi

            case "$file" in
              # ===== Python ai-agent-service (blocking вҖ” жөӢиҜ•ж–Үд»¶еҝ…йЎ»еӯҳеңЁпјҢdeploy жөҒж°ҙзәҝжү§иЎҢ) =====
              backend/ai-agent-service/app/tools/*.py)
                tool_name=$(basename "$file" .py)
                if echo "$CHANGED_FILES" | grep -qE "tests/unit/test_tools_|tests/test_tools_|tests/unit/test_${tool_name}|tests/test_${tool_name}|tests/e2e/real/"; then
                  echo "| $file | Tool (L2+L3) | вң… |" >> $GITHUB_STEP_SUMMARY
                else
                  echo "| $file | Tool (L2+L3) | вқҢ BLOCKED |" >> $GITHUB_STEP_SUMMARY
                  MISSING_BLOCK="$MISSING_BLOCK\n- **$file**: Tool еҸҳжӣҙеҝ…йЎ»иЎҘ L2 еҚ•жөӢ + L3 Real E2E"
                  BLOCKERS=$((BLOCKERS + 1))
                fi
                ;;
              backend/ai-agent-service/app/graph/*.py)
                if echo "$CHANGED_FILES" | grep -qE "tests/unit/test_graph_|tests/test_graph_|tests/unit/test_skill_|tests/test_skill_"; then
                  echo "| $file | Graph/Skill (L2) | вң… |" >> $GITHUB_STEP_SUMMARY
                else
                  echo "| $file | Graph/Skill (L2) | вқҢ BLOCKED |" >> $GITHUB_STEP_SUMMARY
                  MISSING_BLOCK="$MISSING_BLOCK\n- **$file**: Graph/Skill еҸҳжӣҙеҝ…йЎ»иЎҘ L2 еҚ•жөӢ"
                  BLOCKERS=$((BLOCKERS + 1))
                fi
                ;;
              backend/ai-agent-service/app/agents/*.py)
                if echo "$CHANGED_FILES" | grep -qE "tests/unit/test_agent_|tests/test_agent_|tests/unit/test_intent_|tests/test_intent_"; then
                  echo "| $file | Agent (L2) | вң… |" >> $GITHUB_STEP_SUMMARY
                else
                  echo "| $file | Agent (L2) | вқҢ BLOCKED |" >> $GITHUB_STEP_SUMMARY
                  MISSING_BLOCK="$MISSING_BLOCK\n- **$file**: Agent еҸҳжӣҙеҝ…йЎ»иЎҘ L2 еҚ•жөӢ"
                  BLOCKERS=$((BLOCKERS + 1))
                fi
                ;;

              # ===== Java admin-api (blocking) =====
              backend/admin-api/src/main/java/com/migao/admin/controller/*.java)
                ctrl_name=$(basename "$file" .java | sed 's/Controller//')
                if echo "$CHANGED_FILES" | grep -qE "${ctrl_name}Test|${ctrl_name}ControllerTest"; then
                  echo "| $file | Controller (L3) | вң… |" >> $GITHUB_STEP_SUMMARY
                else
                  echo "| $file | Controller (L3) | вқҢ BLOCKED |" >> $GITHUB_STEP_SUMMARY
                  MISSING_BLOCK="$MISSING_BLOCK\n- **$file**: Controller еҸҳжӣҙеҝ…йЎ»иЎҘ MockMvc йӣҶжҲҗжөӢиҜ• + API contract E2E"
                  BLOCKERS=$((BLOCKERS + 1))
                fi
                ;;
              backend/admin-api/src/main/java/com/migao/admin/service/*.java)
                svc_name=$(basename "$file" .java | sed 's/Service//')
                if echo "$CHANGED_FILES" | grep -qE "${svc_name}Test|${svc_name}ServiceTest"; then
                  echo "| $file | Service (L2) | вң… |" >> $GITHUB_STEP_SUMMARY
                else
                  echo "| $file | Service (L2) | вқҢ BLOCKED |" >> $GITHUB_STEP_SUMMARY
                  MISSING_BLOCK="$MISSING_BLOCK\n- **$file**: Service еҸҳжӣҙеҝ…йЎ»иЎҘ JUnit еҚ•жөӢпјҲиҰҶзӣ–зҺҮ вүҘ80%пјү"
                  BLOCKERS=$((BLOCKERS + 1))
                fi
                ;;
              backend/admin-api/src/main/java/com/migao/admin/mapper/*.java)
                mapper_name=$(basename "$file" .java | sed 's/Mapper//')
                if echo "$CHANGED_FILES" | grep -qE "${mapper_name}Test|${mapper_name}MapperTest"; then
                  echo "| $file | Mapper (L2) | вң… |" >> $GITHUB_STEP_SUMMARY
                else
                  echo "| $file | Mapper (L2) | вқҢ BLOCKED |" >> $GITHUB_STEP_SUMMARY
                  MISSING_BLOCK="$MISSING_BLOCK\n- **$file**: Mapper еҸҳжӣҙеҝ…йЎ»иЎҘ JUnit SQL йӘҢиҜҒжөӢиҜ•"
                  BLOCKERS=$((BLOCKERS + 1))
                fi
                ;;
              backend/admin-api/src/main/java/com/migao/admin/security/*.java)
                if echo "$CHANGED_FILES" | grep -qE "SecurityConfigTest|JwtTokenProviderTest"; then
                  echo "| $file | Security (L2) | вң… |" >> $GITHUB_STEP_SUMMARY
                else
                  echo "| $file | Security (L2) | вқҢ BLOCKED |" >> $GITHUB_STEP_SUMMARY
                  MISSING_BLOCK="$MISSING_BLOCK\n- **$file**: е®үе…Ёз»„д»¶еҸҳжӣҙеҝ…йЎ»иЎҘе®үе…ЁжөӢиҜ•пјҲJWT йӘҢиҜҒ + и®ӨиҜҒжөҒзЁӢпјү"
                  BLOCKERS=$((BLOCKERS + 1))
                fi
                ;;

              # ===== Java admin-api (warn only) =====
              backend/admin-api/src/main/java/com/migao/admin/entity/*.java|backend/admin-api/src/main/java/com/migao/admin/dto/*.java)
                echo "| $file | Entity/DTO | вҡ пёҸ йңҖ API contract йӘҢиҜҒ |" >> $GITHUB_STEP_SUMMARY
                MISSING_WARN="$MISSING_WARN\n- **$file**: Entity/DTO еәҸеҲ—еҢ–еӯ—ж®өйңҖеңЁ API contract E2E йӘҢиҜҒ"
                WARNINGS=$((WARNINGS + 1))
                ;;

              # ===== Frontend admin-web (blocking) =====
              frontend/admin-web/src/components/*.tsx|\
              frontend/admin-web/src/components/*/*.tsx|\
              frontend/admin-web/src/components/*/*/*.tsx)
                comp_name=$(basename "$file" .tsx)
                if echo "$CHANGED_FILES" | grep -qE "tests/unit/components/${comp_name}|tests/unit/.*${comp_name}"; then
                  echo "| $file | Component (L4) | вң… |" >> $GITHUB_STEP_SUMMARY
                else
                  echo "| $file | Component (L4) | вқҢ BLOCKED |" >> $GITHUB_STEP_SUMMARY
                  MISSING_BLOCK="$MISSING_BLOCK\n- **$file**: дәӨдә’з»„д»¶еҸҳжӣҙеҝ…йЎ»иЎҘ L4 E2EпјҲзӮ№еҮ»й“ҫи·ҜпјҡжёІжҹ“вҶ’зӮ№еҮ»вҶ’еҸ‘йҖҒвҶ’йӘҢиҜҒпјү"
                  BLOCKERS=$((BLOCKERS + 1))
                fi
                ;;
              frontend/admin-web/src/app/*|\
              frontend/admin-web/src/app/*/*|\
              frontend/admin-web/src/app/*/*/*)
                # жЈҖжҹҘжҳҜеҗҰе·Іжңү E2E иҰҶзӣ–пјҡдјҳе…ҲзңӢ PR diff дёӯжҳҜеҗҰеҗ« tests/e2e/specs/пјҢ
                # еҶҚзңӢд»“еә“дёӯжҳҜеҗҰе·ІжңүеҜ№еә” domain зҡ„ E2E specпјҲд»Һи·Ҝеҫ„дёӯжҸҗеҸ– domainпјүгҖӮ
                page_has_e2e=false
                if echo "$CHANGED_FILES" | grep -qE "tests/e2e/specs/"; then
                  page_has_e2e=true
                else
                  # д»Һ page и·Ҝеҫ„жҸҗеҸ– domainпјҲеҰӮ orders/customers/products/after-salesпјүпјҢ
                  # еҢ№й…ҚжЁЎејҸ: src/app/(dashboard)/{domain}/[id]/... жҲ– src/app/{domain}/...
                  domain=$(echo "$file" | sed -n 's|.*/app/([^)]*/)*\([a-z][a-z-]*\)/\[id\]/.*|\1|p' | head -1)
                  if [ -z "$domain" ]; then
                    # е°қиҜ•йқһ dashboard и·Ҝеҫ„
                    domain=$(echo "$file" | sed -n 's|.*/app/\([a-z][a-z-]*\)/.*|\1|p' | head -1)
                  fi
                  if [ -n "$domain" ] && ls tests/e2e/specs/${domain}/*.spec.ts >/dev/null 2>&1; then
                    page_has_e2e=true
                  fi
                  # е…ңеә•: д»“еә“дёӯе·Іжңү >= 3 дёӘ E2E domain зӣ®еҪ• вҶ’ иҜҙжҳҺйЎ№зӣ® E2E дҪ“зі»е·Іе»әз«Ӣ
                  if [ "$page_has_e2e" = false ]; then
                    e2e_domains=$(ls -d tests/e2e/specs/*/ 2>/dev/null | wc -l)
                    if [ "$e2e_domains" -ge 3 ]; then
                      page_has_e2e=true
                    fi
                  fi
                fi
                if [ "$page_has_e2e" = true ]; then
                  echo "| $file | Page (L4) | вң… |" >> $GITHUB_STEP_SUMMARY
                else
                  echo "| $file | Page (L4) | вқҢ BLOCKED |" >> $GITHUB_STEP_SUMMARY
                  MISSING_BLOCK="$MISSING_BLOCK\n- **$file**: ж–°еўһ/дҝ®ж”№йЎөйқўеҝ…йЎ»еңЁ tests/e2e/specs/ иЎҘ E2E spec дё”еңЁ anti-placeholder PAGES ж•°з»„жіЁеҶҢ"
                  BLOCKERS=$((BLOCKERS + 1))
                fi
                ;;
              frontend/admin-web/src/lib/*.ts|frontend/admin-web/src/store/*.ts)
                if echo "$CHANGED_FILES" | grep -qE "tests/unit/lib/|tests/unit/store/"; then
                  echo "| $file | Lib/Store (L2) | вң… |" >> $GITHUB_STEP_SUMMARY
                else
                  echo "| $file | Lib/Store (L2) | вқҢ BLOCKED |" >> $GITHUB_STEP_SUMMARY
                  MISSING_BLOCK="$MISSING_BLOCK\n- **$file**: е·Ҙе…·еҮҪж•°/зҠ¶жҖҒз®ЎзҗҶеҸҳжӣҙеҝ…йЎ»иЎҘ L2 еҚ•е…ғжөӢиҜ•"
                  BLOCKERS=$((BLOCKERS + 1))
                fi
                ;;

              # ===== Python ai-agent-service вҖ” иЎҘе……и·Ҝеҫ„ (blocking) =====
              backend/ai-agent-service/app/utils/*.py)
                util_name=$(basename "$file" .py)
                if echo "$CHANGED_FILES" | grep -qE "tests/unit/test_${util_name}|tests/test_${util_name}"; then
                  echo "| $file | Utils (L2) | вң… |" >> $GITHUB_STEP_SUMMARY
                else
                  echo "| $file | Utils (L2) | вқҢ BLOCKED |" >> $GITHUB_STEP_SUMMARY
                  MISSING_BLOCK="$MISSING_BLOCK\n- **$file**: Utils е·Ҙе…·еҮҪж•°еҸҳжӣҙеҝ…йЎ»иЎҘ L2 еҚ•жөӢ"
                  BLOCKERS=$((BLOCKERS + 1))
                fi
                ;;
              backend/ai-agent-service/app/api/*.py)
                api_name=$(basename "$file" .py)
                if echo "$CHANGED_FILES" | grep -qE "tests/unit/test_${api_name}|tests/test_${api_name}|tests/e2e/real/"; then
                  echo "| $file | API Route (L3) | вң… |" >> $GITHUB_STEP_SUMMARY
                else
                  echo "| $file | API Route (L3) | вқҢ BLOCKED |" >> $GITHUB_STEP_SUMMARY
                  MISSING_BLOCK="$MISSING_BLOCK\n- **$file**: API и·Ҝз”ұеҸҳжӣҙеҝ…йЎ»иЎҘ L3 йӣҶжҲҗжөӢиҜ•"
                  BLOCKERS=$((BLOCKERS + 1))
                fi
                ;;
              backend/ai-agent-service/app/router/*.py)
                if echo "$CHANGED_FILES" | grep -qE "tests/unit/test_router_|tests/test_router_|tests/unit/test_intent_|tests/test_intent_|tests/unit/test_skill_routing|tests/test_skill_routing"; then
                  echo "| $file | Router (L2) | вң… |" >> $GITHUB_STEP_SUMMARY
                else
                  echo "| $file | Router (L2) | вқҢ BLOCKED |" >> $GITHUB_STEP_SUMMARY
                  MISSING_BLOCK="$MISSING_BLOCK\n- **$file**: и·Ҝз”ұз»„д»¶еҸҳжӣҙеҝ…йЎ»иЎҘ L2 еҚ•жөӢ"
                  BLOCKERS=$((BLOCKERS + 1))
                fi
                ;;
              backend/ai-agent-service/app/llm/*.py)
                if echo "$CHANGED_FILES" | grep -qE "tests/unit/test_llm_|tests/test_llm_|tests/unit/test_dual_agent|tests/test_dual_agent"; then
                  echo "| $file | LLM (L2) | вң… |" >> $GITHUB_STEP_SUMMARY
                else
                  echo "| $file | LLM (L2) | вқҢ BLOCKED |" >> $GITHUB_STEP_SUMMARY
                  MISSING_BLOCK="$MISSING_BLOCK\n- **$file**: LLM з»„д»¶еҸҳжӣҙеҝ…йЎ»иЎҘ L2 еҚ•жөӢ"
                  BLOCKERS=$((BLOCKERS + 1))
                fi
                ;;
              backend/ai-agent-service/app/memory/*.py)
                if echo "$CHANGED_FILES" | grep -qE "tests/unit/test_memory_|tests/test_memory_|tests/unit/test_session_memory|tests/test_session_memory|tests/unit/test_context|tests/test_context"; then
                  echo "| $file | Memory (L2) | вң… |" >> $GITHUB_STEP_SUMMARY
                else
                  echo "| $file | Memory (L2) | вқҢ BLOCKED |" >> $GITHUB_STEP_SUMMARY
                  MISSING_BLOCK="$MISSING_BLOCK\n- **$file**: Memory з»„д»¶еҸҳжӣҙеҝ…йЎ»иЎҘ L2 еҚ•жөӢ"
                  BLOCKERS=$((BLOCKERS + 1))
                fi
                ;;

              # ===== Java admin-api вҖ” иЎҘе……и·Ҝеҫ„ (blocking) =====
              backend/admin-api/src/main/java/com/migao/admin/config/*.java)
                cfg_name=$(basename "$file" .java)
                if echo "$CHANGED_FILES" | grep -qE "${cfg_name}Test|${cfg_name}ConfigTest"; then
                  echo "| $file | Config (L2) | вң… |" >> $GITHUB_STEP_SUMMARY
                else
                  echo "| $file | Config (L2) | вқҢ BLOCKED |" >> $GITHUB_STEP_SUMMARY
                  MISSING_BLOCK="$MISSING_BLOCK\n- **$file**: Config еҸҳжӣҙеҝ…йЎ»иЎҘ JUnit й…ҚзҪ®жөӢиҜ•"
                  BLOCKERS=$((BLOCKERS + 1))
                fi
                ;;
              backend/admin-api/src/main/java/com/migao/admin/exception/*.java)
                exc_name=$(basename "$file" .java)
                if echo "$CHANGED_FILES" | grep -qE "${exc_name}Test|${exc_name}HandlerTest|ExceptionHandlerTest"; then
                  echo "| $file | Exception (L2) | вң… |" >> $GITHUB_STEP_SUMMARY
                else
                  echo "| $file | Exception (L2) | вқҢ BLOCKED |" >> $GITHUB_STEP_SUMMARY
                  MISSING_BLOCK="$MISSING_BLOCK\n- **$file**: Exception еҸҳжӣҙеҝ…йЎ»иЎҘејӮеёёеӨ„зҗҶжөӢиҜ•"
                  BLOCKERS=$((BLOCKERS + 1))
                fi
                ;;

              # ===== Infra / Config (info only) =====
              deploy/terraform/*.tf|.github/workflows/*.yml)
                echo "| $file | Infra/CI | в„№пёҸ йңҖзЎ®и®Ө smoke test иҰҶзӣ– |" >> $GITHUB_STEP_SUMMARY
                ;;

              # ===== жөӢиҜ•ж–Үд»¶ / ж–ҮжЎЈ / й…ҚзҪ® (auto-pass) =====
              */test*|*/tests/*|*.md|.gitignore|.env.example|*.xml|*.json|*.lock|*.sql|docs/*|*.png|*.jpg|*.svg)
                echo "| $file | Test/Doc/Config | вң… иҮӘеҠЁйҖҡиҝҮ |" >> $GITHUB_STEP_SUMMARY
                ;;

              # ===== жңӘеҢ№й…Қзҡ„ж–Үд»¶ вҖ” й»ҳи®Ө info =====
              *)
                echo "| $file | вҖ” | в„№пёҸ жңӘиҜҶеҲ«пјҢи·іиҝҮ |" >> $GITHUB_STEP_SUMMARY
                ;;
            esac
          done

          echo "" >> $GITHUB_STEP_SUMMARY

          # иҫ“еҮәжұҮжҖ»
          if [ $BLOCKERS -gt 0 ]; then
            echo "## вқҢ еҸ‘зҺ° $BLOCKERS еӨ„йҳ»еЎһйЎ№" >> $GITHUB_STEP_SUMMARY
            echo -e "$MISSING_BLOCK" >> $GITHUB_STEP_SUMMARY
          fi
          if [ $WARNINGS -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## вҡ пёҸ еҸ‘зҺ° $WARNINGS еӨ„иӯҰе‘ҠпјҲйқһйҳ»еЎһпјү" >> $GITHUB_STEP_SUMMARY
            echo -e "$MISSING_WARN" >> $GITHUB_STEP_SUMMARY
          fi
          if [ $BLOCKERS -eq 0 ] && [ $WARNINGS -eq 0 ]; then
            echo "## вң… е…ЁйғЁйҖҡиҝҮ вҖ” жүҖжңүд»Јз ҒеҸҳжӣҙеқҮжңүеҜ№еә”жөӢиҜ•иҰҶзӣ–" >> $GITHUB_STEP_SUMMARY
          fi

          echo "BLOCKERS=$BLOCKERS" >> $GITHUB_OUTPUT
          echo "WARNINGS=$WARNINGS" >> $GITHUB_OUTPUT

      # йҳ»еЎһжЈҖжҹҘпјҡжңү blocking йЎ№ж—¶жү“ж Үзӯҫ + fail job
      - name: Fail on blocking violations
        if: steps.check.outputs.BLOCKERS != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "вқҢ QA Growth Gate еҸ‘зҺ° ${{ steps.check.outputs.BLOCKERS }} еӨ„зјәжөӢпјҢйҳ»еЎһеҗҲе№¶гҖӮ"
          echo "иҜ·иЎҘе……еҜ№еә”жөӢиҜ•пјҢжҲ–еңЁ .github/qa-exemptions.yml дёӯж·»еҠ еҗҲжі•иұҒе…ҚйЎ№гҖӮ"
          echo "иҜҰи§Ғ docs/testing/qa-growth-gate.md"
          gh pr edit "$PR_NUMBER" --add-label "junshi-review/needs-changes" 2>/dev/null || true
          exit 1

      # д»»дҪ• CI еӨұиҙҘйғҪжү“ needs-changesпјҲиҰҶзӣ– typecheck/еҚ•жөӢ/E2EпјҢдёҚжӯў Growth Gateпјү
      - name: Label needs-changes on any failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr edit "$PR_NUMBER" --add-label "junshi-review/needs-changes" 2>/dev/null || true
          echo "рҹ”§ иҮӘеҠЁж Үи®° needs-changes вҖ” agent-poll е°Ҷдҝ®еӨҚ"

      # PR comment вҖ” е§Ӣз»ҲеҸ‘еёғ/жӣҙж–°пјҲpass/fail/warn йғҪжӣҙж–°пјү
      - name: Post PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const blockers = '${{ steps.check.outputs.BLOCKERS }}';
            const warnings = '${{ steps.check.outputs.WARNINGS }}';

            // иҜ»еҸ– step summary е№¶иҪ¬дёә PR comment ж јејҸ
            let summary = '';
            try {
              summary = fs.readFileSync(process.env.GITHUB_STEP_SUMMARY, 'utf8');
            } catch (e) {
              summary = 'QA Growth Gate иҝҗиЎҢејӮеёёпјҢж— жі•иҜ»еҸ–жү«жҸҸз»“жһңгҖӮ';
            }

            // PR comment йҮҢж ҮйўҳйҷҚзә§пјҲ### иҖҢйқһ ##пјҢйҒҝе…Қз ҙеқҸйЎөйқўз»“жһ„пјү
            const tableContent = summary
              .replace(/^## /gm, '### ')
              .replace(/^# /gm, '## ');

            const b = parseInt(blockers) || 0;
            const w = parseInt(warnings) || 0;

            let icon, verdict, detail;
            if (b > 0) {
              icon = 'вқҢ';
              verdict = 'BLOCKED';
              detail = '> вқҢ **еҗҲе№¶иў«йҳ»еЎһ**гҖӮиҜ·иЎҘе……зјәеӨұзҡ„жөӢиҜ•пјҢжҲ–еңЁ `.github/qa-exemptions.yml` дёӯж·»еҠ еҗҲжі•иұҒе…ҚйЎ№еҗҺйҮҚж–°иҜ·жұӮ ReviewгҖӮ\n> иҜҰи§Ғ [docs/testing/qa-growth-gate.md](docs/testing/qa-growth-gate.md)';
            } else if (w > 0) {
              icon = 'вҡ пёҸ';
              verdict = 'WARNINGS';
              detail = '> вҡ пёҸ жңүиӯҰе‘ҠдҪҶдёҚйҳ»еЎһеҗҲе№¶гҖӮиҜ·е°Ҫеҝ«иЎҘе……жөӢиҜ•гҖӮ';
            } else {
              icon = 'вң…';
              verdict = 'PASSED';
              detail = '> вң… жүҖжңүжЈҖжҹҘйҖҡиҝҮпјҒ';
            }

            const body = `## ${icon} QA Growth Gate вҖ” ${verdict}

            ${tableContent}

            ---
            **Blockers**: ${b} | **Warnings**: ${w}
            ${detail}
            `;

            // жҹҘжүҫе·Іжңү QA Gate иҜ„и®ә вҶ’ жӣҙж–°пјӣеҗҰеҲҷеҲӣе»ә
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const prevComment = comments.find(c => c.body.includes('QA Growth Gate'));
            if (prevComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: prevComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
