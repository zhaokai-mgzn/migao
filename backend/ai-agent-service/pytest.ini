[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -s --cov=app --cov-report=term-missing --strict-markers --ignore=tests/test_pe_decision_logic.py --ignore=tests/e2e/real/ --ignore=tests/test_bugfix_multimodal_directreply.py --ignore=tests/test_e2e_full_chain.py --ignore=tests/test_graph_nodes.py --ignore=tests/test_multimodal_content_handling.py --ignore=tests/test_graph_skills.py --ignore=tests/test_xiaobu_multi_turn_scenarios.py --ignore=tests/test_follow_up_suggestions.py --ignore=tests/test_mibao_multiturn_intelligence.py --ignore=tests/test_mibao_advanced_multiturn.py --ignore=tests/test_e2e_chat_flow.py --ignore=tests/test_e2e_mibao_scenarios.py
markers =
    asyncio: marks tests as async
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    registry: tool registry completeness verification
    api: api endpoint integration tests
    scenario: business scenario tests
    enum_alignment: tool enum value alignment with admin-api
    permission: role-based permission control tests
    error_handling: error handling and graceful degradation tests
    sse: sse stream response format tests
    e2e: end-to-end full chain tests
