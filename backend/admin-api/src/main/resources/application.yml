server:
  port: 8080
  servlet:
    context-path: /
  tomcat:
    threads:
      max: 200
    accept-count: 100

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: admin-api
  
  # 404 异常抛出配置
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  
  # PostgreSQL 数据库配置
  datasource:
    url: jdbc:postgresql://${RDS_HOST:localhost}:${RDS_PORT:5432}/${RDS_DB:ai_customer_service}
    username: ${RDS_USER:app_user}
    password: ${RDS_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 1800000

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:}
      client-name: admin-api
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  # Jackson 配置
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.aikf.admin.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: ASSIGN_UUID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  # RSA 私钥（用于 RS256 签名）
  private-key: ${JWT_PRIVATE_KEY:classpath:rsa/private.pem}
  # RSA 公钥（用于验证）
  public-key: ${JWT_PUBLIC_KEY:classpath:rsa/public.pem}
  # Token 过期时间（秒）
  access-token-expiration: 7200  # 2 小时
  refresh-token-expiration: 604800  # 7 天
  # Cookie 配置
  cookie:
    name: access_token
    domain: ${COOKIE_DOMAIN:}
    path: /
    secure: true
    http-only: true
    same-site: strict

# 多租户配置
tenant:
  # 租户 ID 请求头名称
  request-header: X-Tenant-Id
  # 是否启用 RLS
  rls-enabled: true

# Service Token 配置
service:
  token:
    # Service Token 请求头名称
    header: X-Service-Token
    # Service Secret（用于验证服务间调用）
    secret: ${SERVICE_TOKEN_SECRET:}

# 阿里云 OSS 配置
aliyun:
  oss:
    endpoint: ${OSS_ENDPOINT:}
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
    bucket-name: ${OSS_BUCKET_NAME:}
    url-prefix: ${OSS_URL_PREFIX:}
  sms:
    access-key-id: ${ALIYUN_SMS_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_SMS_ACCESS_KEY_SECRET:}
    sign-name: ${ALIYUN_SMS_SIGN_NAME:}
    template-code: ${ALIYUN_SMS_TEMPLATE_CODE:}

# 微信小程序配置
wechat:
  mini:
    appid: ${WECHAT_MINI_APPID:}
    secret: ${WECHAT_MINI_SECRET:}

# 日志配置
logging:
  level:
    com.aikf.admin: INFO
    com.aikf.admin.mapper: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# SpringDoc / OpenAPI 配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  default-produces-media-type: application/json
  default-consumes-media-type: application/json

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
